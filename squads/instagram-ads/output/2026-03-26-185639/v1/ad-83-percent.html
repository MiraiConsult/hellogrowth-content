<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1350">
<title>HelloGrowth Ad - 83%</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }
  .container {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  /* Subtle geometric overlay */
  .container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(60deg, transparent 40%, rgba(0, 200, 83, 0.03) 40%, rgba(0, 200, 83, 0.03) 40.5%, transparent 40.5%),
      linear-gradient(-60deg, transparent 55%, rgba(255,255,255,0.02) 55%, rgba(255,255,255,0.02) 55.5%, transparent 55.5%),
      linear-gradient(0deg, transparent 70%, rgba(255,255,255,0.015) 70%, rgba(255,255,255,0.015) 70.3%, transparent 70.3%),
      linear-gradient(90deg, transparent 25%, rgba(0, 200, 83, 0.02) 25%, rgba(0, 200, 83, 0.02) 25.3%, transparent 25.3%);
    pointer-events: none;
    z-index: 1;
  }

  /* Subtle radial glow behind hero number */
  .container::after {
    content: '';
    position: absolute;
    top: 28%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 200, 83, 0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
    margin-top: -60px;
  }

  .hero-number {
    font-size: 220px;
    font-weight: 800;
    color: #00c853;
    line-height: 1;
    letter-spacing: -6px;
    margin-bottom: 20px;
    text-shadow: 0 0 80px rgba(0, 200, 83, 0.3);
  }

  .subtext-line1 {
    font-size: 48px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.9);
    line-height: 1.3;
    margin-bottom: 60px;
    letter-spacing: -0.5px;
  }

  .subtext-line2 {
    font-size: 42px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.75);
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .subtext-line3 {
    font-size: 52px;
    font-weight: 600;
    color: #ffffff;
    line-height: 1.3;
    margin-bottom: 0;
  }

  .subtext-line3 .highlight {
    color: #00c853;
    font-weight: 700;
  }

  .stars {
    margin-top: 70px;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 4px;
  }

  .stars .star-icons {
    color: rgba(0, 200, 83, 0.5);
    font-size: 24px;
    letter-spacing: 2px;
  }

  .stars .rating-number {
    color: rgba(255, 255, 255, 0.4);
    font-size: 24px;
    margin-left: 8px;
  }

  /* Bottom branding bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
    padding: 50px 60px 50px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .tagline {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 0.5px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: #00c853;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 20px;
    height: 20px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.5px;
  }

  .logo-text .logo-accent {
    color: #00c853;
  }

  /* Thin accent line at very bottom */
  .accent-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent 0%, #00c853 50%, transparent 100%);
    z-index: 3;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="hero-number">83%</div>
      <div class="subtext-line1">das empresas ignoram isso.</div>
      <div class="subtext-line2">As que n&atilde;o ignoram</div>
      <div class="subtext-line3">faturam <span class="highlight">62%</span> a mais.</div>
      <div class="stars">
        <span class="star-icons">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
        <span class="rating-number">4.8</span>
      </div>
    </div>
    <div class="bottom-bar">
      <div class="tagline">Mais reputa&ccedil;&atilde;o. Mais confian&ccedil;a. Mais vendas.</div>
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 3L13 8H17L14 12L15.5 17L10 14L4.5 17L6 12L3 8H7L10 3Z" fill="white"/>
          </svg>
        </div>
        <div class="logo-text">Hello<span class="logo-accent">Growth</span></div>
      </div>
    </div>
    <div class="accent-line"></div>
  </div>
</body>
</html>
