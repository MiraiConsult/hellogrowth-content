<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02 - Dado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #12122e 0%, #1e1e4a 50%, #12122e 100%);
    color: #ffffff;
    overflow: hidden;
    position: relative;
  }
  .geo-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .geo-lines::before {
    content: '';
    position: absolute;
    top: 200px; right: -200px;
    width: 700px; height: 700px;
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 50%;
  }
  .geo-lines::after {
    content: '';
    position: absolute;
    bottom: 300px; left: -100px;
    width: 400px; height: 400px;
    border: 1px solid rgba(0,200,83,0.05);
    border-radius: 50%;
  }
  .line-diag {
    position: absolute;
    width: 1px;
    background: rgba(255,255,255,0.03);
    transform-origin: top left;
  }
  .line-diag-1 { top: 0; left: 300px; height: 1350px; transform: rotate(12deg); }
  .line-diag-2 { top: 0; left: 750px; height: 1350px; transform: rotate(-8deg); }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100% - 100px);
    padding: 80px 80px 0;
    text-align: center;
  }
  .hero-number {
    font-size: 180px;
    font-weight: 800;
    color: #00c853;
    line-height: 1;
    letter-spacing: -5px;
  }
  .line1 {
    font-size: 42px;
    font-weight: 400;
    margin-top: 20px;
    opacity: 0.9;
  }
  .line2 {
    font-size: 48px;
    font-weight: 700;
    margin-top: 10px;
    line-height: 1.3;
    max-width: 800px;
  }
  .subtext {
    font-size: 30px;
    color: rgba(255,255,255,0.5);
    margin-top: 40px;
    max-width: 750px;
    line-height: 1.4;
  }
  .source {
    font-size: 20px;
    color: rgba(255,255,255,0.3);
    margin-top: 50px;
  }
  .swipe {
    margin-top: 40px;
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    font-weight: 500;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100px;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .bottom-bar .tagline {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }
  .bottom-bar .logo {
    font-size: 26px;
    font-weight: 700;
    color: #00c853;
  }
</style>
</head>
<body>
  <div class="geo-lines">
    <div class="line-diag line-diag-1"></div>
    <div class="line-diag line-diag-2"></div>
  </div>
  <div class="content">
    <div class="hero-number">96%</div>
    <div class="line1">dos consumidores pesquisam</div>
    <div class="line2">avaliações antes de comprar.</div>
    <div class="subtext">9 em cada 10 descartam notas abaixo de 4 estrelas.</div>
    <div class="source">Fonte: Reclame Aqui, 2025</div>
    <div class="swipe">Deslize →</div>
  </div>
  <div class="bottom-bar">
    <div class="tagline">Mais reputação. Mais confiança. Mais vendas.</div>
    <div class="logo">HelloGrowth</div>
  </div>
</body>
</html>
