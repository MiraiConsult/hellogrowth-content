<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 06 - CTA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #12122e 0%, #1e1e4a 50%, #12122e 100%);
    color: #ffffff;
    overflow: hidden;
    position: relative;
  }
  .geo-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .geo-lines::before {
    content: '';
    position: absolute;
    top: 150px; right: -180px;
    width: 600px; height: 600px;
    border: 1px solid rgba(0,200,83,0.06);
    border-radius: 50%;
  }
  .geo-lines::after {
    content: '';
    position: absolute;
    bottom: 300px; left: -120px;
    width: 450px; height: 450px;
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 50%;
  }
  .line-diag {
    position: absolute;
    width: 1px;
    background: rgba(255,255,255,0.03);
    transform-origin: top left;
  }
  .line-diag-1 { top: 0; left: 350px; height: 1350px; transform: rotate(12deg); }
  .line-diag-2 { top: 0; left: 680px; height: 1350px; transform: rotate(-14deg); }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100% - 100px);
    padding: 80px 80px 0;
    text-align: center;
  }

  .headline {
    font-size: 52px;
    font-weight: 500;
    line-height: 1.2;
  }
  .headline-green {
    font-size: 72px;
    font-weight: 800;
    color: #00c853;
    margin-top: 5px;
    margin-bottom: 50px;
  }

  .price {
    font-size: 52px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .price-sub {
    font-size: 26px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 50px;
  }

  .cta-button {
    display: inline-block;
    padding: 26px 80px;
    background: #00c853;
    color: #0a0a1a;
    font-size: 34px;
    font-weight: 700;
    border-radius: 60px;
    letter-spacing: 1px;
    margin-bottom: 40px;
  }

  .brand {
    font-size: 44px;
    font-weight: 800;
    color: #00c853;
    margin-top: 30px;
    letter-spacing: 1px;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100px;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .bottom-bar .tagline {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }
  .bottom-bar .logo {
    font-size: 26px;
    font-weight: 700;
    color: #00c853;
  }
</style>
</head>
<body>
  <div class="geo-lines">
    <div class="line-diag line-diag-1"></div>
    <div class="line-diag line-diag-2"></div>
  </div>
  <div class="content">
    <div class="headline">Sua nota no Google,</div>
    <div class="headline-green">no controle.</div>
    <div class="price">A partir de R$99,90/mês</div>
    <div class="price-sub">Sem fidelidade. Configuração em 5 minutos.</div>
    <div class="cta-button">Saiba Mais →</div>
    <div class="brand">HelloGrowth</div>
  </div>
  <div class="bottom-bar">
    <div class="tagline">Mais reputação. Mais confiança. Mais vendas.</div>
    <div class="logo">HelloGrowth</div>
  </div>
</body>
</html>
