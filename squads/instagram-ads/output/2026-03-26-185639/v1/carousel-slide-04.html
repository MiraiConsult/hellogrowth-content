<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 04 - Solução</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1350px;
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #12122e 0%, #1e1e4a 50%, #12122e 100%);
    color: #ffffff;
    overflow: hidden;
    position: relative;
  }
  .geo-lines {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .geo-lines::before {
    content: '';
    position: absolute;
    top: 100px; right: -200px;
    width: 600px; height: 600px;
    border: 1px solid rgba(0,200,83,0.05);
    border-radius: 50%;
  }
  .geo-lines::after {
    content: '';
    position: absolute;
    bottom: 250px; left: -150px;
    width: 500px; height: 500px;
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 50%;
  }
  .line-diag {
    position: absolute;
    width: 1px;
    background: rgba(255,255,255,0.03);
    transform-origin: top left;
  }
  .line-diag-1 { top: 0; left: 400px; height: 1350px; transform: rotate(10deg); }
  .line-diag-2 { top: 0; left: 700px; height: 1350px; transform: rotate(-15deg); }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100% - 100px);
    padding: 80px 80px 0;
    text-align: center;
  }

  .headline {
    font-size: 48px;
    font-weight: 400;
    margin-bottom: 5px;
  }
  .headline-green {
    font-size: 60px;
    font-weight: 800;
    color: #00c853;
    margin-bottom: 50px;
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 24px;
    width: 100%;
    max-width: 820px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 30px 36px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    text-align: left;
  }
  .step-icon {
    font-size: 44px;
    flex-shrink: 0;
  }
  .step-text {
    font-size: 30px;
    font-weight: 500;
    line-height: 1.3;
  }
  .step-num {
    font-size: 20px;
    font-weight: 700;
    color: #00c853;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #00c853;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .result {
    font-size: 34px;
    font-weight: 600;
    margin-top: 50px;
    line-height: 1.5;
    max-width: 750px;
    opacity: 0.9;
  }

  .swipe {
    margin-top: 35px;
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    font-weight: 500;
  }

  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100px;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    z-index: 2;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .bottom-bar .tagline {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }
  .bottom-bar .logo {
    font-size: 26px;
    font-weight: 700;
    color: #00c853;
  }
</style>
</head>
<body>
  <div class="geo-lines">
    <div class="line-diag line-diag-1"></div>
    <div class="line-diag line-diag-2"></div>
  </div>
  <div class="content">
    <div class="headline">Com o HelloRating,</div>
    <div class="headline-green">isso muda.</div>
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-icon">📊</div>
        <div class="step-text">Mede satisfação automaticamente</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-icon">⭐</div>
        <div class="step-text">Direciona satisfeitos para o Google</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-icon">🔔</div>
        <div class="step-text">Alerta internamente sobre insatisfeitos</div>
      </div>
    </div>
    <div class="result">Sua nota sobe. Suas avaliações multiplicam.</div>
    <div class="swipe">Deslize →</div>
  </div>
  <div class="bottom-bar">
    <div class="tagline">Mais reputação. Mais confiança. Mais vendas.</div>
    <div class="logo">HelloGrowth</div>
  </div>
</body>
</html>
