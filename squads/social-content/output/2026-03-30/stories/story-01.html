<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 01 - WhatsApp Green</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1920px;
    background: #0d0d0d;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }
  .story {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, #25D366 0%, #128C7E 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px 90px;
    box-sizing: border-box;
    text-align: center;
    position: relative;
  }
  .handle {
    position: absolute; top: 80px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 24px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }
  .big-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 280px;
    color: #fff;
    line-height: 1;
    margin-bottom: 20px;
    text-shadow: 0 4px 40px rgba(0,0,0,0.15);
  }
  .body-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500; font-size: 36px;
    color: rgba(255,255,255,0.92);
    line-height: 1.5;
    max-width: 750px;
    margin-bottom: 50px;
  }
  .question {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 34px;
    color: #fff;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="big-number">82%</div>
  <div class="body-text">dos brasileiros usam WhatsApp para falar com empresas</div>
  <div class="question">Você está vendendo por lá?</div>
</div>
</body>
</html>
