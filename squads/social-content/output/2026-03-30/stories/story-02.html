<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 02 - Dica Rápida</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1920px;
    background: #0d0d0d;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }
  .story {
    width: 1080px; height: 1920px;
    background: #0d0d0d;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px 90px;
    box-sizing: border-box;
    text-align: center;
    position: relative;
  }
  .handle {
    position: absolute; top: 80px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 24px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 26px;
    color: #25D366;
    text-transform: uppercase;
    letter-spacing: 8px;
    margin-bottom: 60px;
  }
  .main-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 56px;
    color: #fff;
    text-transform: uppercase;
    line-height: 1.2;
    max-width: 800px;
    margin-bottom: 50px;
  }
  .sub-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500; font-size: 28px;
    color: #6CCFAA;
    line-height: 1.5;
    max-width: 700px;
  }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="label">Dica Rápida</div>
  <div class="main-text">RESPONDA EM MENOS DE 5 MINUTOS.</div>
  <div class="sub-text">Cada minuto a mais reduz 7% a chance de venda.</div>
</div>
</body>
</html>
