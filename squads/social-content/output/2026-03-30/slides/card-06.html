<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 06 - 4 Dicas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px; height: 1350px;
    background: linear-gradient(180deg, #3BAA7A 0%, #2D7D5F 100%);
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
    box-sizing: border-box;
    position: relative;
  }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 56px;
    text-transform: uppercase;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 70px;
    text-align: center;
  }
  .tip-item {
    display: flex; align-items: flex-start; gap: 30px;
    margin-bottom: 45px;
    padding-left: 20px;
    border-left: 4px solid rgba(255,255,255,0.35);
    padding-top: 5px;
    padding-bottom: 5px;
  }
  .tip-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 56px;
    color: #fff;
    line-height: 1;
    flex-shrink: 0;
    min-width: 60px;
  }
  .tip-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500; font-size: 26px;
    color: rgba(255,255,255,0.92);
    line-height: 1.5;
    padding-top: 8px;
  }
  .handle {
    position: absolute; top: 40px; right: 60px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 22px;
    color: rgba(255,255,255,0.45);
  }
</style>
</head>
<body>
<div class="card">
  <div class="handle">@hellogrowth__</div>
  <div class="title">4 DICAS PARA VENDER<br>MAIS NO WHATSAPP</div>
  <div class="tip-item">
    <div class="tip-number">1</div>
    <div class="tip-text">Responda em menos de 5 minutos</div>
  </div>
  <div class="tip-item">
    <div class="tip-number">2</div>
    <div class="tip-text">Use catálogo com fotos profissionais</div>
  </div>
  <div class="tip-item">
    <div class="tip-number">3</div>
    <div class="tip-text">Ative IA para atender 24/7</div>
  </div>
  <div class="tip-item">
    <div class="tip-number">4</div>
    <div class="tip-text">Peça avaliação pós-venda</div>
  </div>
</div>
</body>
</html>
