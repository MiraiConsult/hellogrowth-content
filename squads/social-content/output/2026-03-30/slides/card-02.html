<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 02 - WhatsApp Green</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px; height: 1350px;
    background: linear-gradient(180deg, #25D366 0%, #128C7E 100%);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px;
    box-sizing: border-box;
  }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 58px;
    text-transform: uppercase;
    color: #fff;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 50px;
  }
  .body-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500; font-size: 26px;
    color: rgba(255,255,255,0.9);
    text-align: center;
    line-height: 1.6;
    max-width: 820px;
    margin-bottom: 60px;
  }
  .stats-row {
    display: flex; gap: 40px;
    justify-content: center;
  }
  .stat-box {
    background: rgba(0,0,0,0.3);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    min-width: 320px;
  }
  .stat-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 80px;
    color: #fff;
    line-height: 1;
    margin-bottom: 12px;
  }
  .stat-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500; font-size: 22px;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
  }
  .handle {
    position: absolute; top: 40px; right: 60px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 22px;
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>
<div class="card" style="position:relative;">
  <div class="handle">@hellogrowth__</div>
  <div class="title">O WHATSAPP É O NOVO<br>BALCÃO DE VENDAS.</div>
  <div class="body-text">60% dos brasileiros já compraram direto pelo WhatsApp. 66% compram após conversar com uma marca no app.</div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-number">60%</div>
      <div class="stat-label">compraram pelo<br>WhatsApp</div>
    </div>
    <div class="stat-box">
      <div class="stat-number">66%</div>
      <div class="stat-label">compram após<br>conversar</div>
    </div>
  </div>
</div>
</body>
</html>
