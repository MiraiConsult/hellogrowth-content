<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 04 - Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px; height: 1350px;
    background: linear-gradient(180deg, #0d0d0d 0%, #0a1a14 100%);
    position: relative;
    padding: 80px;
    box-sizing: border-box;
    display: flex; flex-direction: column;
    justify-content: center;
  }
  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900; font-size: 24px;
    color: #25D366;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 70px;
    text-align: center;
  }
  .timeline {
    position: relative;
    margin-left: 160px;
    padding-left: 80px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 0; top: 10px; bottom: 10px;
    width: 4px;
    background: linear-gradient(180deg, #25D366 0%, #128C7E 100%);
    border-radius: 2px;
  }
  .timeline-item {
    position: relative;
    margin-bottom: 70px;
    padding-left: 20px;
  }
  .timeline-item:last-child { margin-bottom: 0; }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -90px; top: 12px;
    width: 20px; height: 20px;
    background: #25D366;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(37,211,102,0.5);
  }
  .timeline-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 40px;
    color: #25D366;
    line-height: 1;
    margin-bottom: 10px;
  }
  .timeline-desc {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400; font-size: 24px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
  }
  .handle {
    position: absolute; top: 40px; right: 60px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700; font-size: 22px;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
<div class="card">
  <div class="handle">@hellogrowth__</div>
  <div class="label">Evolução</div>
  <div class="timeline">
    <div class="timeline-item">
      <div class="timeline-year">2020</div>
      <div class="timeline-desc">WhatsApp = só mensagens</div>
    </div>
    <div class="timeline-item">
      <div class="timeline-year">2023</div>
      <div class="timeline-desc">WhatsApp Business = catálogo</div>
    </div>
    <div class="timeline-item">
      <div class="timeline-year">2025</div>
      <div class="timeline-desc">WhatsApp = pagamentos</div>
    </div>
    <div class="timeline-item">
      <div class="timeline-year">2026</div>
      <div class="timeline-desc">WhatsApp + IA = vendas automatizadas</div>
    </div>
  </div>
</div>
</body>
</html>
