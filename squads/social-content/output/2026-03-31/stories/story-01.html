<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Story 01</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0d0d0d;font-family:Arial,sans-serif;color:#fff}
  .story{width:1080px;height:1920px;background:#0d0d0d;display:flex;flex-direction:column}
  .ticker{height:50px;background:#0d0d0d;border-bottom:2px solid #2D7D5F;display:flex;align-items:center;justify-content:space-between;padding:0 40px;font-size:13px;font-weight:600;letter-spacing:2px;color:#6CCFAA;text-transform:uppercase}
  .ticker .dot{display:inline-block;width:10px;height:10px;background:#3BAA7A;border-radius:50%;margin-right:10px}
  .main{flex:1;padding:100px 70px 60px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
  .label{font-size:14px;font-weight:700;color:#3BAA7A;letter-spacing:4px;text-transform:uppercase;border:1px solid #2D7D5F;padding:10px 20px;margin-bottom:40px}
  .bignum{font-family:Impact, 'Arial Black';font-weight:900;font-size:520px;color:#3BAA7A;line-height:.8;letter-spacing:-12px}
  .name{font-family:Impact, 'Arial Black';font-weight:900;font-size:80px;color:#fff;margin-top:20px;letter-spacing:2px}
  .sub{font-family:Arial;font-size:20px;font-weight:600;color:#666;letter-spacing:3px;text-transform:uppercase;margin-top:10px}
  .chart{width:100%;max-width:800px;margin-top:80px;background:#111;border:1px solid #1f1f1f;padding:40px}
  .chart-title{font-family:Arial;font-size:12px;font-weight:700;color:#3BAA7A;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;text-align:left}
  .bar-row{display:flex;align-items:center;margin-bottom:20px;gap:14px}
  .bar-name{font-family:Arial;font-size:16px;font-weight:700;color:#fff;width:140px;text-align:left;text-transform:uppercase;letter-spacing:1px}
  .bar-track{flex:1;height:42px;background:#0d0d0d;position:relative;border-left:2px solid #2D7D5F}
  .bar-fill{height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:14px;font-family:Impact, 'Arial Black';font-weight:900;font-size:22px;color:#0d0d0d}
  .tagline{font-family:Impact, 'Arial Black';font-weight:900;font-size:48px;color:#fff;margin-top:60px;text-transform:uppercase;line-height:1}
  .tagline span{color:#3BAA7A}
  .footer{height:60px;background:#0d0d0d;border-top:2px solid #2D7D5F;display:flex;align-items:center;justify-content:space-between;padding:0 40px;font-size:13px;font-weight:600;letter-spacing:2px;color:#6CCFAA;text-transform:uppercase}
</style>
</head>
<body>
<div class="story">
  <div class="ticker">
    <span><span class="dot"></span>REPORT 03/31 • BENCHMARK • LIVE</span>
    <span>BR • 2026</span>
  </div>
  <div class="main">
    <div class="label">WORLD-CLASS SCORE</div>
    <div class="bignum">+87</div>
    <div class="name">NUBANK</div>
    <div class="sub">NPS SCORE / FINTECH BR</div>
    <div class="chart">
      <div class="chart-title">&gt; RANKING GLOBAL</div>
      <div class="bar-row"><div class="bar-name">NUBANK</div><div class="bar-track"><div class="bar-fill" style="width:100%;background:#3BAA7A">87</div></div></div>
      <div class="bar-row"><div class="bar-name">NATURA</div><div class="bar-track"><div class="bar-fill" style="width:92%;background:#6CCFAA">80</div></div></div>
      <div class="bar-row"><div class="bar-name">APPLE</div><div class="bar-track"><div class="bar-fill" style="width:83%;background:#A0E8CC">72</div></div></div>
    </div>
    <div class="tagline">World-class<br><span>loyalty score</span></div>
  </div>
  <div class="footer">
    <span>@HELLOGROWTH__</span>
    <span>SOURCE: BAIN 2025</span>
  </div>
</div>
</body>
</html>
