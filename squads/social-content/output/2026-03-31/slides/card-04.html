<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Card 04</title>

<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0d0d0d;font-family:Arial,sans-serif;color:#fff}
  .card{width:1080px;height:1350px;background:#0d0d0d;display:flex;flex-direction:column}
  .ticker{height:40px;background:#0d0d0d;border-bottom:2px solid #2D7D5F;display:flex;align-items:center;justify-content:space-between;padding:0 30px;font-size:11px;font-weight:600;letter-spacing:2px;color:#6CCFAA;text-transform:uppercase}
  .ticker .dot{display:inline-block;width:8px;height:8px;background:#3BAA7A;border-radius:50%;margin-right:8px}
  .main{flex:1;padding:60px 60px 30px;display:flex;flex-direction:column}
  .label{font-size:12px;font-weight:700;color:#3BAA7A;letter-spacing:3px;text-transform:uppercase;border-left:3px solid #3BAA7A;padding-left:12px;margin-bottom:20px}
  h2{font-family:Impact, 'Arial Black';font-weight:900;font-size:58px;color:#fff;line-height:.95;text-transform:uppercase;margin-bottom:30px}
  h2 span{color:#3BAA7A}
  .chart-wrap{flex:1;background:#111;border:1px solid #1f1f1f;padding:30px;position:relative}
  .legend-top{display:flex;gap:30px;margin-bottom:20px}
  .leg{display:flex;align-items:center;gap:8px;font-family:Arial;font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:1px}
  .leg .ln{width:24px;height:3px}
  .kpi-row{display:flex;gap:20px;margin-top:30px}
  .kpi{flex:1;background:#111;border-left:3px solid #3BAA7A;padding:16px 20px}
  .kpi .v{font-family:Impact, 'Arial Black';font-weight:900;font-size:46px;color:#3BAA7A;line-height:1}
  .kpi .l{font-family:Arial;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
  .footer{height:50px;background:#0d0d0d;border-top:2px solid #2D7D5F;display:flex;align-items:center;justify-content:space-between;padding:0 30px;font-size:11px;font-weight:600;letter-spacing:2px;color:#6CCFAA;text-transform:uppercase}
  .page{color:#3BAA7A;font-weight:800}
</style>
</head>
<body>
<div class="card">
  <div class="ticker">
    <span><span class="dot"></span>REPORT 03/31 • TIME SERIES • 2021-2026</span>
    <span>YOY GROWTH</span>
  </div>
  <div class="main">
    <div class="label">5-YEAR EVOLUTION</div>
    <h2>NPS cresce <span>+32%</span> em 5 anos<br>quando bem gerido</h2>
    <div class="chart-wrap">
      <div class="legend-top">
        <div class="leg"><div class="ln" style="background:#3BAA7A"></div>Gestão ativa</div>
        <div class="leg"><div class="ln" style="background:#FF4444"></div>Reativas</div>
      </div>
      <svg width="100%" height="420" viewBox="0 0 900 420">
        <!-- grid -->
        <g stroke="#1f1f1f" stroke-width="1">
          <line x1="60" y1="40" x2="880" y2="40"/>
          <line x1="60" y1="120" x2="880" y2="120"/>
          <line x1="60" y1="200" x2="880" y2="200"/>
          <line x1="60" y1="280" x2="880" y2="280"/>
          <line x1="60" y1="360" x2="880" y2="360"/>
        </g>
        <!-- y labels -->
        <g font-family="Inter" font-size="11" fill="#666" font-weight="600">
          <text x="45" y="45" text-anchor="end">100</text>
          <text x="45" y="125" text-anchor="end">75</text>
          <text x="45" y="205" text-anchor="end">50</text>
          <text x="45" y="285" text-anchor="end">25</text>
          <text x="45" y="365" text-anchor="end">0</text>
        </g>
        <!-- x labels -->
        <g font-family="Inter" font-size="12" fill="#999" font-weight="700">
          <text x="100" y="395" text-anchor="middle">2021</text>
          <text x="255" y="395" text-anchor="middle">2022</text>
          <text x="410" y="395" text-anchor="middle">2023</text>
          <text x="565" y="395" text-anchor="middle">2024</text>
          <text x="720" y="395" text-anchor="middle">2025</text>
          <text x="875" y="395" text-anchor="middle">2026</text>
        </g>
        <!-- green line: 45,55,62,68,73,77 -->
        <polyline fill="none" stroke="#3BAA7A" stroke-width="4"
          points="100,216 255,184 410,162 565,142 720,126 875,114"/>
        <polyline fill="rgba(59,170,122,.1)" stroke="none"
          points="100,216 255,184 410,162 565,142 720,126 875,114 875,360 100,360"/>
        <!-- red line: 30,27,24,22,20,18 -->
        <polyline fill="none" stroke="#FF4444" stroke-width="4" stroke-dasharray="6 4"
          points="100,264 255,274 410,283 565,290 720,296 875,303"/>
        <!-- points -->
        <g fill="#3BAA7A">
          <circle cx="100" cy="216" r="5"/><circle cx="255" cy="184" r="5"/>
          <circle cx="410" cy="162" r="5"/><circle cx="565" cy="142" r="5"/>
          <circle cx="720" cy="126" r="5"/><circle cx="875" cy="114" r="6" stroke="#fff" stroke-width="2"/>
        </g>
        <g fill="#FF4444">
          <circle cx="100" cy="264" r="4"/><circle cx="255" cy="274" r="4"/>
          <circle cx="410" cy="283" r="4"/><circle cx="565" cy="290" r="4"/>
          <circle cx="720" cy="296" r="4"/><circle cx="875" cy="303" r="4"/>
        </g>
        <!-- annotations -->
        <text x="875" y="100" text-anchor="end" font-family="Barlow Condensed" font-size="22" font-weight="900" fill="#3BAA7A">77</text>
        <text x="100" y="205" text-anchor="start" font-family="Barlow Condensed" font-size="18" font-weight="900" fill="#3BAA7A">45</text>
        <text x="875" y="320" text-anchor="end" font-family="Barlow Condensed" font-size="18" font-weight="900" fill="#FF4444">18</text>
      </svg>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="v">+32</div><div class="l">pontos ganhos</div></div>
      <div class="kpi"><div class="v">5yr</div><div class="l">período analisado</div></div>
      <div class="kpi" style="border-left-color:#FF4444"><div class="v" style="color:#FF4444">-12</div><div class="l">reativas perdem</div></div>
    </div>
  </div>
  <div class="footer">
    <span>@HELLOGROWTH__</span>
    <span>5-YEAR EVOLUTION</span>
    <span class="page">04/07</span>
  </div>
</div>
</body>
</html>
