<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 07 — CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(180deg, #0d0d0d 0%, #0a1a14 100%);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 70px;
    text-align: center;
    gap: 50px;
  }
  .question {
    font-size: 56px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.25;
    max-width: 850px;
  }
  .cta-text {
    font-size: 34px;
    font-weight: 500;
    color: #6CCFAA;
  }
  .divider {
    width: 200px;
    height: 3px;
    background: linear-gradient(90deg, transparent, #2D7D5F, transparent);
  }
  .brand {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(90deg, #2D7D5F, #6CCFAA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .slogan {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }
  .source {
    font-size: 16px;
    font-weight: 400;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
  <div class="content">
    <h1 class="question">Quantas avaliações sua empresa tem?</h1>
    <span class="cta-text">Comenta aqui &#128071;</span>
    <div class="divider"></div>
    <span class="brand">HELLOGROWTH</span>
    <span class="slogan">Crescimento inteligente para e-commerce</span>
    <span class="source">Fonte: ABComm, Nuvemshop 2026</span>
  </div>
</body>
</html>
