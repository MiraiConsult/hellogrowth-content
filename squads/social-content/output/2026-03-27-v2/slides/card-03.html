<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 03 — Quote</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,700;0,900;1,400;1,500;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 80px;
    text-align: center;
  }
  .quote-mark {
    font-size: 100px;
    font-weight: 900;
    color: #3BAA7A;
    line-height: 1;
    margin-bottom: 20px;
  }
  .quote-text {
    font-size: 44px;
    font-weight: 500;
    font-style: italic;
    color: #ffffff;
    line-height: 1.4;
    max-width: 850px;
    margin-bottom: 40px;
  }
  .accent-line {
    width: 120px;
    height: 4px;
    background: linear-gradient(90deg, #2D7D5F, #6CCFAA);
    border-radius: 2px;
    margin-bottom: 30px;
  }
  .source {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
  }
  .handle {
    position: absolute;
    bottom: 50px;
    font-size: 20px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="quote-mark">&ldquo;&rdquo;</div>
    <p class="quote-text">Lojas sem avaliações são ignoradas. Sem prova social, seu produto não existe.</p>
    <div class="accent-line"></div>
    <span class="source">— Pesquisa Nuvemshop 2026</span>
  </div>
  <span class="handle" style="position:absolute;bottom:50px;left:50%;transform:translateX(-50%)">@hellogrowth__</span>
</body>
</html>
