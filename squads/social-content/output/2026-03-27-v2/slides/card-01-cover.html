<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 01 — Capa</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(135deg, #0a2a1e 0%, #2D7D5F 50%, #0d0d0d 100%);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .bg-photo {
    position: absolute;
    inset: 0;
    background: url('gamma-cover.png') center/cover no-repeat;
    opacity: 0.25;
    mix-blend-mode: luminosity;
  }
  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(10,42,30,0.85) 0%, rgba(45,125,95,0.6) 50%, rgba(13,13,13,0.9) 100%);
  }
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 60px;
  }
  .big-number {
    font-size: 200px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -6px;
    text-shadow: 0 4px 40px rgba(108,207,170,0.4);
  }
  .headline {
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    margin-top: 30px;
    line-height: 1.2;
    max-width: 800px;
  }
  .meta {
    position: absolute;
    bottom: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .handle {
    font-size: 22px;
    font-weight: 500;
    color: #6CCFAA;
    letter-spacing: 1px;
  }
  .date {
    font-size: 18px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>
  <div class="content">
    <div class="big-number">R$260bi</div>
    <div class="headline">E sua empresa ainda não tem avaliações?</div>
    <div class="meta">
      <span class="handle">@hellogrowth__</span>
      <span class="date">MAR 2026</span>
    </div>
  </div>
</body>
</html>
