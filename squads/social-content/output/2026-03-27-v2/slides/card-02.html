<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 02 — Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(180deg, #2D7D5F 0%, #236B4E 100%);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 70px;
    gap: 60px;
  }
  .headline {
    font-size: 50px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.25;
    max-width: 800px;
  }
  .cards {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }
  .stat-card {
    display: flex;
    align-items: center;
    gap: 40px;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    padding: 40px 50px;
    background: rgba(255,255,255,0.08);
  }
  .stat-number {
    font-size: 100px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    min-width: 260px;
  }
  .stat-label {
    font-size: 32px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    line-height: 1.3;
  }
  .handle {
    position: absolute;
    bottom: 50px;
    left: 70px;
    font-size: 20px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
  <div class="content">
    <h1 class="headline">O consumidor de 2026 pesquisa antes de comprar.</h1>
    <div class="cards">
      <div class="stat-card">
        <span class="stat-number">70%</span>
        <span class="stat-label">leem avaliações</span>
      </div>
      <div class="stat-card">
        <span class="stat-number">43%</span>
        <span class="stat-label">influenciam decisão</span>
      </div>
    </div>
  </div>
  <span class="handle">@hellogrowth__</span>
</body>
</html>
