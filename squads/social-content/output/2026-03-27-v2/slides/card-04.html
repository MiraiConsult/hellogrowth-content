<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 04 — Antes/Depois</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .split {
    display: flex;
    width: 100%;
    height: 100%;
    position: relative;
  }
  .side {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    gap: 40px;
  }
  .left {
    background: linear-gradient(180deg, #1a0a0a 0%, #1f0e0e 100%);
  }
  .right {
    background: linear-gradient(180deg, #0a1a14 0%, #0e1f17 100%);
  }
  .side-label {
    font-size: 28px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
  }
  .left .side-label { color: #FF4444; }
  .right .side-label { color: #6CCFAA; }
  .star {
    font-size: 90px;
    font-weight: 900;
    line-height: 1;
  }
  .left .star { color: #FF4444; }
  .right .star { color: #6CCFAA; }
  .side-desc {
    font-size: 28px;
    font-weight: 500;
    text-align: center;
    line-height: 1.3;
  }
  .left .side-desc { color: rgba(255,68,68,0.7); }
  .right .side-desc { color: rgba(108,207,170,0.7); }
  .divider {
    position: absolute;
    left: 50%;
    top: 10%;
    bottom: 10%;
    width: 2px;
    background: rgba(255,255,255,0.2);
    transform: translateX(-50%);
  }
  .vs-circle {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2D7D5F, #6CCFAA);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 900;
    color: #0d0d0d;
    z-index: 2;
    box-shadow: 0 0 30px rgba(108,207,170,0.4);
  }
  .handle {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="split">
    <div class="side left">
      <span class="side-label">SEM avaliações</span>
      <span class="star">3.2&#9733;</span>
      <span class="side-desc">Invisível para IA</span>
    </div>
    <div class="side right">
      <span class="side-label">COM avaliações</span>
      <span class="star">4.8&#9733;</span>
      <span class="side-desc">Recomendado pela IA</span>
    </div>
    <div class="divider"></div>
    <div class="vs-circle">VS</div>
  </div>
  <span class="handle">@hellogrowth__</span>
</body>
</html>
