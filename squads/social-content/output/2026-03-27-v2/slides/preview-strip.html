<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Preview Strip</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    padding: 40px;
    font-family: sans-serif;
  }
  .strip {
    display: flex;
    gap: 20px;
    overflow-x: auto;
  }
  .strip img {
    width: 270px;
    height: 337px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="strip">
    <img src="card-01-cover.png" alt="Card 01">
    <img src="card-02.png" alt="Card 02">
    <img src="card-03.png" alt="Card 03">
    <img src="card-04.png" alt="Card 04">
    <img src="card-05.png" alt="Card 05">
    <img src="card-06.png" alt="Card 06">
    <img src="card-07-cta.png" alt="Card 07">
  </div>
</body>
</html>
