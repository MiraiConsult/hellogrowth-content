<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 05 — Lista</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(180deg, #0d0d0d 0%, #0a1a14 100%);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 70px;
    gap: 50px;
  }
  .label {
    font-size: 24px;
    font-weight: 700;
    color: #6CCFAA;
    text-transform: uppercase;
    letter-spacing: 4px;
  }
  .items {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .item {
    display: flex;
    gap: 35px;
    align-items: flex-start;
  }
  .item-number {
    font-size: 80px;
    font-weight: 900;
    color: #3BAA7A;
    line-height: 1;
    min-width: 90px;
    text-shadow: 0 0 30px rgba(59,170,122,0.3);
  }
  .item-text {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-top: 8px;
  }
  .item-action {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.2;
  }
  .item-sub {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    line-height: 1.3;
  }
  .handle {
    position: absolute;
    bottom: 50px;
    left: 70px;
    font-size: 20px;
    font-weight: 500;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <div class="content">
    <span class="label">3 Ações que vendem</span>
    <div class="items">
      <div class="item">
        <span class="item-number">1</span>
        <div class="item-text">
          <span class="item-action">Peça feedback 24h após a entrega</span>
          <span class="item-sub">Volume importa tanto quanto nota</span>
        </div>
      </div>
      <div class="item">
        <span class="item-number">2</span>
        <div class="item-text">
          <span class="item-action">Responda TODA avaliação</span>
          <span class="item-sub">Positiva E negativa — a IA mede recência</span>
        </div>
      </div>
      <div class="item">
        <span class="item-number">3</span>
        <div class="item-text">
          <span class="item-action">Mostre reviews no site e redes</span>
          <span class="item-sub">Prova social converte 3x mais</span>
        </div>
      </div>
    </div>
  </div>
  <span class="handle">@hellogrowth__</span>
</body>
</html>
