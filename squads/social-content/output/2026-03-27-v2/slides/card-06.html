<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 06 — Colorido</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(180deg, #3BAA7A 0%, #2D7D5F 100%);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 80px;
    text-align: center;
    gap: 30px;
  }
  .big-number {
    font-size: 180px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    text-shadow: 0 4px 40px rgba(0,0,0,0.2);
  }
  .main-text {
    font-size: 44px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
    max-width: 750px;
  }
  .sub-text {
    font-size: 30px;
    font-weight: 500;
    color: rgba(13,13,13,0.6);
    line-height: 1.4;
    max-width: 700px;
    margin-top: 10px;
  }
  .handle {
    position: absolute;
    bottom: 50px;
    font-size: 20px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
  <div class="content">
    <div class="big-number">54%</div>
    <p class="main-text">desconfiam de avaliações perfeitas.</p>
    <p class="sub-text">O consumidor quer autenticidade, não perfeição.</p>
  </div>
  <span class="handle" style="position:absolute;bottom:50px;left:50%;transform:translateX(-50%)">@hellogrowth__</span>
</body>
</html>
