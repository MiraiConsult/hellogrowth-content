<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 01 — Stat</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(180deg, #3BAA7A 0%, #2D7D5F 100%);
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 80px;
    text-align: center;
    gap: 40px;
  }
  .big-number {
    font-size: 260px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    text-shadow: 0 6px 50px rgba(0,0,0,0.2);
  }
  .main-text {
    font-size: 48px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
    max-width: 800px;
  }
  .sub-text {
    font-size: 34px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
    line-height: 1.3;
    max-width: 700px;
    margin-top: 20px;
  }
  .handle {
    position: absolute;
    top: 60px;
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>
  <span class="handle" style="position:absolute;top:60px;left:50%;transform:translateX(-50%)">@hellogrowth__</span>
  <div class="content">
    <div class="big-number">70%</div>
    <p class="main-text">leem avaliações antes de comprar</p>
    <p class="sub-text">E a sua empresa? Tem avaliações?</p>
  </div>
</body>
</html>
