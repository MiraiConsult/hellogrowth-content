<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 02 — Provocativa</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1920px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .content {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px 80px;
    text-align: center;
  }
  .statement {
    font-size: 56px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.35;
    max-width: 850px;
  }
  .statement .highlight {
    color: #6CCFAA;
  }
  .handle {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
  <span class="handle">@hellogrowth__</span>
  <div class="content">
    <p class="statement">Sem avaliações, seu produto <strong>NÃO</strong> existe.<br><br>A <span class="highlight">prova social</span> é o que separa quem vende de quem desaparece.</p>
  </div>
</body>
</html>
