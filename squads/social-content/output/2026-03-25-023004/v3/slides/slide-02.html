<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Inter', sans-serif; overflow: hidden; }
.slide {
  width: 1080px; height: 1350px;
  position: relative; overflow: hidden;
}
.bg-image {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: url('https://images.unsplash.com/photo-1531482615713-2afd69097998?w=1080&h=1350&fit=crop') center/cover;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.92) 60%);
}
.content {
  position: relative; z-index: 2; width: 100%; height: 100%;
  padding: 60px 70px; display: flex; flex-direction: column;
  justify-content: flex-end; color: #fff;
}
.top-bar {
  position: absolute; top: 40px; left: 70px; right: 70px; z-index: 3;
  font-size: 18px; font-weight: 700; opacity: 0.7;
}
.stat-number {
  font-size: 180px; font-weight: 900; line-height: 0.9;
  color: #FF4444; margin-bottom: 10px;
}
.headline {
  font-size: 48px; font-weight: 900; line-height: 1.1;
  margin-bottom: 30px;
}
.body-text {
  font-size: 28px; font-weight: 400; line-height: 1.5;
  opacity: 0.75; margin-bottom: 30px;
}
.highlight-box {
  background: rgba(255,68,68,0.15); border-left: 4px solid #FF4444;
  padding: 20px 24px; border-radius: 0 12px 12px 0;
  font-size: 28px; font-weight: 600;
}
.accent { color: #FF4444; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-image"></div>
  <div class="overlay"></div>
  <div class="top-bar">@hellogrowth</div>
  <div class="content">
    <div class="stat-number">97%</div>
    <div class="headline">dos consumidores pesquisam avaliações antes de comprar.</div>
    <div class="body-text">Isso não é tendência, é o novo normal. Seu cliente abre o Google e lê o que dizem sobre você.</div>
    <div class="highlight-box">E <span class="accent">92%</span> só interagem com empresas nota <span class="accent">4+</span></div>
  </div>
</div>
</body>
</html>
