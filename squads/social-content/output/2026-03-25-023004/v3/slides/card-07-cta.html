<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Inter', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; padding: 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(160deg, #0d0d0d 0%, #0a1a14 100%); color: #fff; position: relative; text-align: center; }
.handle { position: absolute; top: 40px; left: 70px; font-size: 18px; font-weight: 700; opacity: 0.5; }
.headline { font-size: 56px; font-weight: 900; line-height: 1.1; margin-bottom: 20px; }
.subtitle { font-size: 28px; font-weight: 400; opacity: 0.55; margin-bottom: 50px; }
.cta-button { background: #2D7D5F; color: #fff; padding: 26px 64px; border-radius: 18px; font-size: 30px; font-weight: 800; display: inline-flex; align-items: center; gap: 12px; margin-bottom: 60px; }
.divider { width: 80px; height: 2px; background: rgba(59,170,122,0.3); margin-bottom: 50px; }
.brand-name { font-size: 42px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(90deg, #2D7D5F, #3BAA7A, #6CCFAA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 14px; }
.brand-slogan { font-size: 22px; font-weight: 400; opacity: 0.4; margin-bottom: 40px; }
.source { font-size: 13px; opacity: 0.2; position: absolute; bottom: 40px; left: 70px; right: 70px; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="handle">@hellogrowth__</div>
  <div class="headline">Qual a nota da sua empresa no Google?</div>
  <div class="subtitle">Se você não sabe, esse é o primeiro problema.</div>
  <div class="cta-button">Comenta aqui embaixo 👇</div>
  <div class="divider"></div>
  <div class="brand-name">HELLOGROWTH</div>
  <div class="brand-slogan">Mais reputação. Mais confiança. Mais vendas.</div>
  <div class="source">Fonte: Portal Information Management / Edelman Trust Barometer 2026</div>
</div>
</body>
</html>
