<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #0d0d0d; } body { background: #0d0d0d; width: 1080px; height: 1350px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; padding: 70px; display: flex; flex-direction: column; justify-content: center; background: #0d0d0d; color: #fff; position: relative; }
.handle { position: absolute; top: 40px; left: 70px; font-size: 18px; font-weight: 700; opacity: 0.5; }
.label { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; color: #2D7D5F; margin-bottom: 30px; }
.tool-row { display: flex; gap: 16px; margin-bottom: 36px; flex-wrap: wrap; }
.tool-badge { background: rgba(45,125,95,0.1); border: 2px solid rgba(59,170,122,0.35); border-radius: 30px; padding: 14px 28px; font-size: 22px; font-weight: 700; color: #6CCFAA; }
.headline { font-size: 56px; font-weight: 900; line-height: 1.08; margin-bottom: 30px; }
.body-text { font-size: 28px; font-weight: 400; line-height: 1.5; opacity: 0.7; margin-bottom: 36px; }
.accent { color: #6CCFAA; font-weight: 700; }
.alert-badge { display: inline-block; background: #2D7D5F; color: #fff; padding: 16px 36px; border-radius: 14px; font-size: 28px; font-weight: 800; }
</style>
</head>
<body>
<div class="card">
  <div class="handle">@hellogrowth__</div>
  <div class="label">O novo juiz</div>
  <div class="tool-row">
    <div class="tool-badge">ChatGPT</div>
    <div class="tool-badge">Perplexity</div>
    <div class="tool-badge">Google AI</div>
  </div>
  <div class="headline">A IA agora julga sua reputação.</div>
  <div class="body-text">Com o <span class="accent">GEO</span>, ferramentas de IA leem suas avaliações para decidir se recomendam você ou o concorrente.</div>
  <div class="alert-badge">Marketing de fachada acabou.</div>
</div>
</body>
</html>
