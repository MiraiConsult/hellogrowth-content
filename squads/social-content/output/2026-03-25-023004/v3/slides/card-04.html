<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #0d0d0d; } body { background: #0d0d0d; width: 1080px; height: 1350px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; position: relative; overflow: hidden; }
.bg-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('gamma-photo-card04.png') center/cover no-repeat; }
.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(13,13,13,0.25) 0%, rgba(13,13,13,0.75) 45%, rgba(13,13,13,0.96) 100%); }
.content { position: relative; z-index: 2; width: 100%; height: 100%; padding: 60px 70px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; }
.handle { position: absolute; top: 40px; left: 70px; font-size: 18px; font-weight: 700; opacity: 0.7; color: #fff; z-index: 3; }
.label { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; color: #2D7D5F; margin-bottom: 20px; }
.big-number { font-size: 160px; font-weight: 900; line-height: 0.85; color: #3BAA7A; margin-bottom: 16px; }
.headline { font-size: 48px; font-weight: 900; line-height: 1.1; margin-bottom: 30px; }
.quote-box { background: rgba(45,125,95,0.12); border-left: 4px solid #3BAA7A; padding: 28px 32px; border-radius: 0 14px 14px 0; margin-bottom: 30px; }
.quote-text { font-size: 28px; font-weight: 600; font-style: italic; color: #A0E8CC; line-height: 1.4; }
</style>
</head>
<body>
<div class="card">
  <div class="bg-photo"></div>
  <div class="overlay"></div>
  <div class="handle">@hellogrowth__</div>
  <div class="content">
    <div class="label">A consequência</div>
    <div class="big-number">40%</div>
    <div class="headline">já deixaram de seguir marcas por ações negativas.</div>
    <div class="quote-box">
      <div class="quote-text">"O consumidor de 2026 não reclama — ele simplesmente some. E leva o dinheiro."</div>
    </div>
  </div>
</div>
</body>
</html>
