<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Inter', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; padding: 70px; display: flex; flex-direction: column; justify-content: center; background: #0d0d0d; color: #fff; position: relative; }
.handle { position: absolute; top: 40px; left: 70px; font-size: 18px; font-weight: 700; opacity: 0.5; }
.label { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; color: #2D7D5F; margin-bottom: 24px; }
.big-number { font-size: 180px; font-weight: 900; line-height: 0.85; color: #3BAA7A; margin-bottom: 16px; }
.headline { font-size: 48px; font-weight: 900; line-height: 1.1; margin-bottom: 30px; }
.body-text { font-size: 28px; font-weight: 400; line-height: 1.5; opacity: 0.7; margin-bottom: 40px; }
.quote-box { background: rgba(45,125,95,0.1); border-left: 4px solid #3BAA7A; padding: 28px 32px; border-radius: 0 14px 14px 0; }
.quote-text { font-size: 28px; font-weight: 600; font-style: italic; color: #A0E8CC; line-height: 1.4; }
</style>
</head>
<body>
<div class="card">
  <div class="handle">@hellogrowth__</div>
  <div class="label">A consequência</div>
  <div class="big-number">40%</div>
  <div class="headline">já deixaram de seguir marcas por ações negativas.</div>
  <div class="body-text">Não foram concorrentes. Foi a própria empresa que espantou seus clientes.</div>
  <div class="quote-box">
    <div class="quote-text">"O consumidor de 2026 não reclama — ele simplesmente some. E leva o dinheiro."</div>
  </div>
</div>
</body>
</html>
