<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Inter', sans-serif; overflow: hidden; }
.slide {
  width: 1080px; height: 1350px;
  position: relative; overflow: hidden;
}
.bg-image {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: url('https://images.unsplash.com/photo-1556745757-8d76bdb6984b?w=1080&h=1350&fit=crop') center/cover;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.85) 100%);
}
.content {
  position: relative; z-index: 2; width: 100%; height: 100%;
  padding: 60px 70px; display: flex; flex-direction: column;
  justify-content: flex-end; color: #fff;
}
.top-bar {
  position: absolute; top: 40px; left: 70px; right: 70px; z-index: 3;
  display: flex; justify-content: space-between; align-items: center;
}
.handle { font-size: 18px; font-weight: 700; opacity: 0.8; }
.date-badge {
  background: rgba(255,255,255,0.15); padding: 8px 18px;
  border-radius: 20px; font-size: 14px; font-weight: 600;
}
.big-copy {
  font-size: 72px; font-weight: 900; line-height: 1.05;
  margin-bottom: 24px; max-width: 90%;
}
.accent { color: #FF4444; }
.sub-copy {
  font-size: 30px; font-weight: 400; opacity: 0.7; margin-bottom: 30px;
}
.swipe-bar {
  display: flex; align-items: center; gap: 12px;
  font-size: 18px; font-weight: 600; opacity: 0.5;
}
.swipe-line { width: 40px; height: 2px; background: #fff; opacity: 0.5; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-image"></div>
  <div class="overlay"></div>
  <div class="top-bar">
    <span class="handle">@hellogrowth</span>
    <span class="date-badge">MAR 2026</span>
  </div>
  <div class="content">
    <div class="big-copy">Sua empresa está <span class="accent">nua</span> na internet.</div>
    <div class="sub-copy">E todo mundo já viu.</div>
    <div class="swipe-bar"><span class="swipe-line"></span> Desliza para ver os dados</div>
  </div>
</div>
</body>
</html>
