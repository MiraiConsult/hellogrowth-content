<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Inter', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; padding: 70px; display: flex; flex-direction: column; justify-content: center; background: #0d0d0d; color: #fff; position: relative; }
.handle { position: absolute; top: 40px; left: 70px; font-size: 18px; font-weight: 700; opacity: 0.5; }
.big-number { font-size: 200px; font-weight: 900; line-height: 0.85; color: #3BAA7A; margin-bottom: 24px; }
.headline { font-size: 52px; font-weight: 900; line-height: 1.1; margin-bottom: 40px; }
.divider { width: 80px; height: 4px; background: #2D7D5F; border-radius: 2px; margin-bottom: 40px; }
.highlight-box { background: rgba(45,125,95,0.12); border-left: 4px solid #3BAA7A; padding: 24px 30px; border-radius: 0 14px 14px 0; }
.highlight-text { font-size: 30px; font-weight: 600; line-height: 1.4; }
.accent { color: #6CCFAA; font-weight: 900; }
</style>
</head>
<body>
<div class="card">
  <div class="handle">@hellogrowth__</div>
  <div class="big-number">97%</div>
  <div class="headline">dos consumidores pesquisam avaliações antes de comprar.</div>
  <div class="divider"></div>
  <div class="highlight-box">
    <div class="highlight-text">E <span class="accent">92%</span> só interagem com empresas nota <span class="accent">4+</span></div>
  </div>
</div>
</body>
</html>
