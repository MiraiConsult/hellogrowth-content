<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1350px; font-family: 'Inter', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; position: relative; overflow: hidden; }
.bg-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('gamma-photo-card02.png') center/cover no-repeat; }
.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(13,13,13,0.2) 0%, rgba(13,13,13,0.7) 45%, rgba(13,13,13,0.96) 100%); }
.content { position: relative; z-index: 2; width: 100%; height: 100%; padding: 60px 70px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; }
.handle { position: absolute; top: 40px; left: 70px; font-size: 18px; font-weight: 700; opacity: 0.7; color: #fff; z-index: 3; }
.headline { font-size: 52px; font-weight: 900; line-height: 1.1; margin-bottom: 30px; }
.accent { color: #6CCFAA; }
.body-text { font-size: 28px; font-weight: 400; line-height: 1.5; opacity: 0.75; margin-bottom: 30px; }
.highlight-box { background: rgba(45,125,95,0.15); border-left: 4px solid #3BAA7A; padding: 24px 30px; border-radius: 0 14px 14px 0; margin-bottom: 30px; }
.highlight-text { font-size: 30px; font-weight: 600; line-height: 1.4; }
</style>
</head>
<body>
<div class="card">
  <div class="bg-photo"></div>
  <div class="overlay"></div>
  <div class="handle">@hellogrowth__</div>
  <div class="content">
    <div class="headline">Antes de comprar, seu cliente abre o Google.</div>
    <div class="body-text">E lê cada avaliação. Cada comentário sem resposta. Cada nota abaixo de 4 estrelas.</div>
    <div class="highlight-box">
      <div class="highlight-text"><span class="accent">92%</span> só interagem com empresas nota <span class="accent">4+</span></div>
    </div>
  </div>
</div>
</body>
</html>
