<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { background: #0d0d0d; } body { background: #0d0d0d; width: 1080px; height: 1350px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; position: relative; overflow: hidden; }
.bg-photo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('gamma-photo-cover.png') center/cover no-repeat; }
.overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(13,13,13,0.15) 0%, rgba(13,13,13,0.65) 45%, rgba(13,13,13,0.95) 100%); }
.content { position: relative; z-index: 2; width: 100%; height: 100%; padding: 60px 70px; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; }
.top-bar { position: absolute; top: 40px; left: 70px; right: 70px; z-index: 3; display: flex; justify-content: space-between; align-items: center; }
.handle { font-size: 18px; font-weight: 700; opacity: 0.8; color: #fff; }
.date-badge { background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; color: #fff; }
.big-number { font-size: 160px; font-weight: 900; line-height: 0.9; color: #3BAA7A; margin-bottom: 20px; }
.headline { font-size: 64px; font-weight: 900; line-height: 1.05; margin-bottom: 20px; }
.accent { color: #6CCFAA; }
.subtitle { font-size: 30px; font-weight: 400; opacity: 0.65; margin-bottom: 30px; }
.swipe-bar { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; opacity: 0.45; }
.swipe-line { width: 40px; height: 2px; background: #fff; }
</style>
</head>
<body>
<div class="card">
  <div class="bg-photo"></div>
  <div class="overlay"></div>
  <div class="top-bar">
    <span class="handle">@hellogrowth__</span>
    <span class="date-badge">MAR 2026</span>
  </div>
  <div class="content">
    <div class="big-number">97%</div>
    <div class="headline">Sua empresa está <span class="accent">nua</span> na internet.</div>
    <div class="subtitle">E todo mundo já viu.</div>
    <div class="swipe-bar"><span class="swipe-line"></span> Desliza para ver os dados</div>
  </div>
</div>
</body>
</html>
