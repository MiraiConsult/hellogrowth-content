<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0d0d0d; width: 1080px; height: 1350px; overflow: hidden; }
  .card {
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Ticker bar */
  .ticker {
    width: 100%;
    height: 48px;
    background: #0d0d0d;
    border-bottom: 2px solid #3BAA7A;
    display: flex;
    align-items: center;
    padding: 0 60px;
    gap: 24px;
    flex-shrink: 0;
  }
  .ticker-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3BAA7A;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .ticker-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #6CCFAA;
  }
  .ticker-sep {
    color: #3BAA7A;
    font-size: 14px;
    font-weight: 500;
  }

  /* Main content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 70px;
    text-align: center;
  }

  .giant-price {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 520px;
    color: #3BAA7A;
    line-height: 0.85;
    letter-spacing: -15px;
    margin-bottom: 30px;
  }

  .title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 52px;
    color: #ffffff;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-bottom: 24px;
    max-width: 900px;
  }

  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 28px;
    color: #666666;
    line-height: 1.4;
  }

  /* Footer */
  .footer {
    width: 100%;
    height: 56px;
    background: #0d0d0d;
    border-top: 2px solid #3BAA7A;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px;
    flex-shrink: 0;
  }
  .footer-handle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #6CCFAA;
  }
  .footer-source {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #444444;
  }
  .footer-page {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 2px;
    color: #6CCFAA;
  }
</style>
</head>
<body>
<div class="card">
  <div class="ticker">
    <div class="ticker-dot"></div>
    <span class="ticker-label">REPORT 04/28</span>
    <span class="ticker-sep">&#8226;</span>
    <span class="ticker-label">RETEN&Ccedil;&Atilde;O</span>
    <span class="ticker-sep">&#8226;</span>
    <span class="ticker-label">EXCLUSIVO</span>
  </div>

  <div class="content">
    <div class="giant-price">R$0</div>
    <div class="title">5 A&Ccedil;&Otilde;ES DE RETEN&Ccedil;&Atilde;O QUE CUSTAM R$0</div>
    <div class="subtitle">E que j&aacute; deveriam estar na sua rotina.</div>
  </div>

  <div class="footer">
    <span class="footer-handle">@HELLOGROWTH__</span>
    <span class="footer-source">FONTE: BAIN, E-COMMERCE BRASIL</span>
    <span class="footer-page">01/07</span>
  </div>
</div>
</body>
</html>
