<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0d0d0d; width: 1080px; height: 1350px; overflow: hidden; }
  .card {
    width: 1080px; height: 1350px; background: #0d0d0d;
    font-family: 'Montserrat', sans-serif; color: #ffffff;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
  }

  .ticker {
    width: 100%; height: 48px; background: #0d0d0d;
    border-bottom: 2px solid #3BAA7A;
    display: flex; align-items: center; padding: 0 60px; gap: 24px; flex-shrink: 0;
  }
  .ticker-dot { width: 8px; height: 8px; border-radius: 50%; background: #3BAA7A; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .ticker-label { font-weight: 500; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #6CCFAA; }
  .ticker-sep { color: #3BAA7A; font-size: 14px; font-weight: 500; }

  .content {
    flex: 1; display: flex; flex-direction: column;
    padding: 60px 70px; justify-content: center;
  }

  .action-label {
    font-weight: 500; font-size: 15px; letter-spacing: 3px;
    text-transform: uppercase; color: #6CCFAA; margin-bottom: 12px;
  }

  .action-number {
    font-weight: 900; font-size: 180px; color: #3BAA7A;
    line-height: 0.85; letter-spacing: -6px; margin-bottom: 20px;
  }

  .headline {
    font-weight: 900; font-size: 48px; color: #ffffff;
    line-height: 1.12; margin-bottom: 32px; letter-spacing: -1px;
  }

  .body-text {
    font-weight: 400; font-size: 27px; color: #cccccc;
    line-height: 1.55; margin-bottom: 48px;
  }
  .body-text strong { color: #3BAA7A; font-weight: 700; }

  /* CTA Box */
  .cta-box {
    border: 2px solid #3BAA7A;
    border-radius: 16px;
    padding: 40px 48px;
    text-align: center;
    margin-bottom: 48px;
    background: rgba(59, 170, 122, 0.06);
  }
  .cta-text {
    font-weight: 900; font-size: 32px; color: #ffffff;
    line-height: 1.35; letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Brand */
  .brand-section {
    text-align: center;
  }
  .brand-name {
    font-weight: 900; font-size: 48px;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #3BAA7A, #6CCFAA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .brand-handle {
    font-weight: 500; font-size: 20px; letter-spacing: 3px;
    text-transform: uppercase; color: #6CCFAA;
  }

  .footer {
    width: 100%; height: 56px; background: #0d0d0d;
    border-top: 2px solid #3BAA7A;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 60px; flex-shrink: 0;
  }
  .footer-handle { font-weight: 500; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #6CCFAA; }
  .footer-page { font-weight: 500; font-size: 14px; letter-spacing: 2px; color: #6CCFAA; }
</style>
</head>
<body>
<div class="card">
  <div class="ticker">
    <div class="ticker-dot"></div>
    <span class="ticker-label">REPORT 04/28</span>
    <span class="ticker-sep">&#8226;</span>
    <span class="ticker-label">A&Ccedil;&Atilde;O 05</span>
    <span class="ticker-sep">&#8226;</span>
    <span class="ticker-label">REFERRAL + CTA</span>
  </div>

  <div class="content">
    <div class="action-label">A&Ccedil;&Atilde;O DE RETEN&Ccedil;&Atilde;O</div>
    <div class="action-number">05</div>
    <div class="headline">PROGRAMA DE<br>INDICA&Ccedil;&Atilde;O SIMPLES</div>
    <div class="body-text">
      Referral programs geram <strong>15-25%</strong> do novo volume<br>
      com <strong>40-60% menos CAC</strong>.
    </div>

    <div class="cta-box">
      <div class="cta-text">SALVE ESTE POST.<br>IMPLEMENTE 1 A&Ccedil;&Atilde;O POR SEMANA.</div>
    </div>

    <div class="brand-section">
      <div class="brand-name">HELLOGROWTH</div>
      <div class="brand-handle">@hellogrowth__</div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-handle">@HELLOGROWTH__</span>
    <span class="footer-page">07/07</span>
  </div>
</div>
</body>
</html>
