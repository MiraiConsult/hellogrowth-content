<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0d0d0d; width: 1080px; height: 1350px; overflow: hidden; }
  .card {
    width: 1080px; height: 1350px; background: #0d0d0d;
    font-family: 'Montserrat', sans-serif; color: #ffffff;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
  }

  .ticker {
    width: 100%; height: 48px; background: #0d0d0d;
    border-bottom: 2px solid #3BAA7A;
    display: flex; align-items: center; padding: 0 60px; gap: 24px; flex-shrink: 0;
  }
  .ticker-dot { width: 8px; height: 8px; border-radius: 50%; background: #3BAA7A; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .ticker-label { font-weight: 500; font-size: 14px; letter-spacing: 3px; text-transform: uppercase; color: #6CCFAA; }
  .ticker-sep { color: #3BAA7A; font-size: 14px; font-weight: 500; }

  .content {
    flex: 1; display: flex; flex-direction: column;
    padding: 60px 70px; justify-content: center;
  }

  .action-label {
    font-weight: 500; font-size: 15px; letter-spacing: 3px;
    text-transform: uppercase; color: #6CCFAA; margin-bottom: 12px;
  }

  .action-number {
    font-weight: 900; font-size: 180px; color: #3BAA7A;
    line-height: 0.85; letter-spacing: -6px; margin-bottom: 20px;
  }

  .headline {
    font-weight: 900; font-size: 46px; color: #ffffff;
    line-height: 1.12; margin-bottom: 36px; letter-spacing: -1px;
  }

  .body-text {
    font-weight: 400; font-size: 27px; color: #cccccc;
    line-height: 1.55; margin-bottom: 50px;
  }

  .stat-row {
    display: flex; align-items: center; gap: 40px;
    margin-bottom: 40px;
  }
  .stat-big {
    font-weight: 900; font-size: 120px; color: #3BAA7A;
    line-height: 1; letter-spacing: -4px;
  }
  .stat-desc {
    font-weight: 400; font-size: 24px; color: #cccccc; line-height: 1.4;
  }

  /* Star rating */
  .star-rating {
    display: flex; gap: 16px; align-items: center; justify-content: center;
    margin-top: 10px;
  }
  .star {
    width: 64px; height: 64px;
  }
  .star svg { width: 64px; height: 64px; }
  .star-filled { fill: #3BAA7A; }
  .star-half { fill: #3BAA7A; }
  .star-empty { fill: #333333; }
  .star-label {
    font-weight: 900; font-size: 40px; color: #3BAA7A; margin-left: 16px;
  }

  .footer {
    width: 100%; height: 56px; background: #0d0d0d;
    border-top: 2px solid #3BAA7A;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 60px; flex-shrink: 0;
  }
  .footer-handle { font-weight: 500; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: #6CCFAA; }
  .footer-page { font-weight: 500; font-size: 14px; letter-spacing: 2px; color: #6CCFAA; }
</style>
</head>
<body>
<div class="card">
  <div class="ticker">
    <div class="ticker-dot"></div>
    <span class="ticker-label">REPORT 04/28</span>
    <span class="ticker-sep">&#8226;</span>
    <span class="ticker-label">A&Ccedil;&Atilde;O 03</span>
    <span class="ticker-sep">&#8226;</span>
    <span class="ticker-label">AVALIA&Ccedil;&Otilde;ES</span>
  </div>

  <div class="content">
    <div class="action-label">A&Ccedil;&Atilde;O DE RETEN&Ccedil;&Atilde;O</div>
    <div class="action-number">03</div>
    <div class="headline">RESPONDER TODA<br>AVALIA&Ccedil;&Atilde;O EM 24H</div>

    <div class="stat-row">
      <div class="stat-big">92%</div>
      <div class="stat-desc">dos consumidores s&oacute; interagem<br>com empresas acima de 4 estrelas.</div>
    </div>

    <div class="body-text">
      O que separa 3.8 de 4.5 muitas vezes &eacute; <strong style="color:#3BAA7A;font-weight:700;">responder</strong>.
    </div>

    <div class="star-rating">
      <div class="star">
        <svg viewBox="0 0 24 24"><polygon class="star-filled" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      </div>
      <div class="star">
        <svg viewBox="0 0 24 24"><polygon class="star-filled" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      </div>
      <div class="star">
        <svg viewBox="0 0 24 24"><polygon class="star-filled" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      </div>
      <div class="star">
        <svg viewBox="0 0 24 24"><polygon class="star-filled" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
      </div>
      <div class="star">
        <svg viewBox="0 0 24 24">
          <defs><linearGradient id="half"><stop offset="50%" stop-color="#3BAA7A"/><stop offset="50%" stop-color="#333333"/></linearGradient></defs>
          <polygon fill="url(#half)" points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
        </svg>
      </div>
      <span class="star-label">4.5</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-handle">@HELLOGROWTH__</span>
    <span class="footer-page">05/07</span>
  </div>
</div>
</body>
</html>
