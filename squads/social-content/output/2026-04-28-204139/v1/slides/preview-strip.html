<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    width: 2030px;
    height: 417px;
    overflow: hidden;
  }
  .strip {
    display: flex;
    gap: 10px;
    padding: 10px;
    width: 2030px;
    height: 417px;
    background: #0d0d0d;
  }
  .card-frame {
    width: 270px;
    height: 337px;
    overflow: hidden;
    border-radius: 8px;
    border: 1px solid #222;
    flex-shrink: 0;
  }
  .card-frame iframe {
    width: 1080px;
    height: 1350px;
    border: none;
    transform: scale(0.25);
    transform-origin: top left;
  }
  .card-label {
    font-family: 'Montserrat', Arial, sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #6CCFAA;
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .card-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>
<body>
<div class="strip">
  <div class="card-wrapper">
    <div class="card-frame"><iframe src="card-01-cover.html"></iframe></div>
    <div class="card-label">01 COVER</div>
  </div>
  <div class="card-wrapper">
    <div class="card-frame"><iframe src="card-02.html"></iframe></div>
    <div class="card-label">02 CONTEXT</div>
  </div>
  <div class="card-wrapper">
    <div class="card-frame"><iframe src="card-03.html"></iframe></div>
    <div class="card-label">03 ACTION</div>
  </div>
  <div class="card-wrapper">
    <div class="card-frame"><iframe src="card-04.html"></iframe></div>
    <div class="card-label">04 NPS</div>
  </div>
  <div class="card-wrapper">
    <div class="card-frame"><iframe src="card-05.html"></iframe></div>
    <div class="card-label">05 REVIEWS</div>
  </div>
  <div class="card-wrapper">
    <div class="card-frame"><iframe src="card-06.html"></iframe></div>
    <div class="card-label">06 BIRTHDAY</div>
  </div>
  <div class="card-wrapper">
    <div class="card-frame"><iframe src="card-07-cta.html"></iframe></div>
    <div class="card-label">07 CTA</div>
  </div>
</div>
</body>
</html>
