<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0d0d0d; width: 1080px; height: 1350px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.card { width: 1080px; height: 1350px; position: relative; display: flex; flex-direction: column; }

/* Photo top half */
.photo-area {
  flex: 0 0 600px;
  position: relative;
  overflow: hidden;
}
.photo {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.photo-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 150px;
  background: linear-gradient(to bottom, transparent, #0d0d0d);
}

/* Header bar over photo */
.header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 28px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
}
.header-left { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6); }
.header-center { font-size: 16px; font-weight: 700; color: #fff; }
.header-right { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.6); }

/* Handle badge over photo */
.handle-badge {
  position: absolute;
  bottom: 160px;
  left: 40px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 5;
}
.handle-dot {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2D7D5F, #6CCFAA);
}
.handle-text { font-size: 18px; font-weight: 700; color: #fff; }

/* Text bottom half */
.text-area {
  flex: 1;
  padding: 30px 40px 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: #0d0d0d;
}
.big-title {
  font-size: 58px;
  font-weight: 900;
  line-height: 1.0;
  text-transform: uppercase;
  letter-spacing: -1px;
  margin-bottom: 30px;
  color: #fff;
}
.highlight { color: #3BAA7A; }
.subtitle-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.arrow {
  color: #3BAA7A;
  font-size: 22px;
  font-weight: 900;
}
.subtitle {
  font-size: 17px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
}
</style>
</head>
<body>
<div class="card">
  <div class="photo-area">
    <img class="photo" src="gamma-portrait.png" alt="">
    <div class="photo-overlay"></div>
    <div class="header">
      <span class="header-left">Powered by HelloGrowth</span>
      <span class="header-center">@hellogrowth__</span>
      <span class="header-right">Março 2026 ®</span>
    </div>
    <div class="handle-badge">
      <div class="handle-dot"></div>
      <span class="handle-text">@hellogrowth__</span>
    </div>
  </div>
  <div class="text-area">
    <div class="big-title">
      R$260 BILHÕES<br>
      EM E-COMMERCE E<br>
      SUA EMPRESA<br>
      <span class="highlight">SEM AVALIAÇÕES?</span>
    </div>
    <div class="subtitle-row">
      <span class="arrow">→</span>
      <span class="subtitle">Por que avaliações valem mais que anúncios em 2026</span>
    </div>
  </div>
</div>
</body>
</html>
