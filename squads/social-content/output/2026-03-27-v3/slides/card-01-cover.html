<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0d0d0d; width: 1080px; height: 1350px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.card {
  width: 1080px; height: 1350px;
  position: relative; overflow: hidden;
}
/* Full photo background */
.photo {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: url('gamma-portrait.png') center top/cover no-repeat;
}
/* Gradient from bottom so text is readable */
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.1) 0%,
    rgba(0,0,0,0.05) 30%,
    rgba(0,0,0,0.4) 55%,
    rgba(0,0,0,0.85) 75%,
    rgba(0,0,0,0.95) 100%
  );
}

/* Header bar */
.header {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 24px 36px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 10;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.55);
  letter-spacing: 0.5px;
}

/* Handle badge mid-page */
.handle-badge {
  position: absolute; top: 520px; left: 36px;
  display: flex; align-items: center; gap: 10px; z-index: 10;
}
.handle-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, #2D7D5F, #6CCFAA);
}
.handle-name { font-size: 17px; font-weight: 700; color: #fff; }

/* Big title text OVER photo */
.title-area {
  position: absolute; bottom: 40px; left: 36px; right: 36px;
  z-index: 10;
}
.big-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 88px;
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 20px;
}
.title-green {
  color: #3BAA7A;
}
.subtitle-row {
  display: flex; align-items: center; gap: 10px;
}
.arrow { color: #3BAA7A; font-size: 18px; font-weight: 900; font-family: 'Montserrat'; }
.subtitle {
  font-family: 'Montserrat';
  font-size: 15px; font-weight: 600;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
</style>
</head>
<body>
<div class="card">
  <div class="photo"></div>
  <div class="overlay"></div>
  <div class="header">
    <span>Powered by HelloGrowth</span>
    <span>@hellogrowth__</span>
    <span>Março 2026 ®</span>
  </div>
  <div class="handle-badge">
    <div class="handle-icon"></div>
    <span class="handle-name">@hellogrowth__</span>
  </div>
  <div class="title-area">
    <div class="big-title">
      R$260 BILHÕES<br>
      EM E-COMMERCE E<br>
      SUA EMPRESA<br>
      <span class="title-green">SEM AVALIAÇÕES?</span>
    </div>
    <div class="subtitle-row">
      <span class="arrow">→</span>
      <span class="subtitle">Por que avaliações valem mais que anúncios em 2026</span>
    </div>
  </div>
</div>
</body>
</html>
