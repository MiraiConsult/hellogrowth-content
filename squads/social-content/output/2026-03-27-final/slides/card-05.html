<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 05 - Tips</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: linear-gradient(180deg, #0d0d0d 0%, #0a1a14 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    box-sizing: border-box;
  }
  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 22px;
    text-transform: uppercase;
    color: #3BAA7A;
    letter-spacing: 4px;
    margin-bottom: 20px;
  }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 52px;
    text-transform: uppercase;
    color: #fff;
    line-height: 1.1;
    margin: 0 0 60px 0;
  }
  .items {
    display: flex;
    flex-direction: column;
    gap: 35px;
  }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 30px;
    border-left: 4px solid rgba(59,170,122,0.4);
    padding-left: 30px;
    padding-top: 8px;
    padding-bottom: 8px;
  }
  .item:hover {
    border-left-color: #3BAA7A;
  }
  .item .num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 64px;
    color: #3BAA7A;
    line-height: 1;
    min-width: 70px;
  }
  .item .text {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
    padding-top: 12px;
  }
  .handle {
    position: absolute;
    bottom: 50px;
    left: 80px;
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
  }
  /* Accent glow */
  .glow {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(59,170,122,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="label">O QUE FAZER</div>
  <h1 class="title">4 ACOES PARA NAO PERDER CLIENTES</h1>
  <div class="items">
    <div class="item">
      <div class="num">1</div>
      <div class="text">Responda em ate 24h &mdash; sempre</div>
    </div>
    <div class="item">
      <div class="num">2</div>
      <div class="text">Personalize cada interacao</div>
    </div>
    <div class="item">
      <div class="num">3</div>
      <div class="text">Peca feedback e AJA sobre ele</div>
    </div>
    <div class="item">
      <div class="num">4</div>
      <div class="text">Treine equipe em empatia digital</div>
    </div>
  </div>
  <div class="handle">@hellogrowth__</div>
</div>
</body>
</html>
