<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 03 - Data</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    box-sizing: border-box;
  }
  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 24px;
    text-transform: uppercase;
    color: #2D7D5F;
    letter-spacing: 4px;
    margin-bottom: 50px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
  }
  .stat-card {
    border: 2px solid #3BAA7A;
    border-radius: 20px;
    padding: 45px 35px;
    background: rgba(59,170,122,0.05);
    transition: all 0.3s;
  }
  .stat-card.full {
    grid-column: 1 / -1;
  }
  .stat-card .number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 64px;
    color: #3BAA7A;
    line-height: 1;
    margin-bottom: 12px;
  }
  .stat-card .desc {
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    line-height: 1.4;
  }
  .handle {
    position: absolute;
    bottom: 50px;
    left: 80px;
    font-family: 'Montserrat', sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
  }
  /* Decorative dots */
  .dots {
    position: absolute;
    top: 60px;
    right: 60px;
    display: grid;
    grid-template-columns: repeat(4, 10px);
    gap: 12px;
  }
  .dots span {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #3BAA7A;
    opacity: 0.3;
  }
  .dots span:nth-child(1), .dots span:nth-child(4) { opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <div class="dots">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
  <div class="label">OS NUMEROS</div>
  <div class="grid">
    <div class="stat-card">
      <div class="number">83%</div>
      <div class="desc">abandonam apos 1 experiencia ruim</div>
    </div>
    <div class="stat-card">
      <div class="number">66%</div>
      <div class="desc">fogem sem personalizacao</div>
    </div>
    <div class="stat-card full">
      <div class="number">95%</div>
      <div class="desc">querem saber por que a IA decide</div>
    </div>
  </div>
  <div class="handle">@hellogrowth__</div>
</div>
</body>
</html>
