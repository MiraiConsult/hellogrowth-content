<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 01 — Warning</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1920px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .story {
    width: 1080px; height: 1920px;
    background: linear-gradient(180deg, #FF6B35 0%, #CC4400 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 0 80px;
    box-sizing: border-box;
    position: relative;
  }
  .handle {
    position: absolute; top: 60px; left: 50%;
    transform: translateX(-50%);
    font-size: 15px; font-weight: 700;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }
  .big-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 300px;
    color: #fff; line-height: 1;
    margin: 0 0 20px 0;
  }
  .body {
    font-family: 'Montserrat', sans-serif;
    font-size: 36px; font-weight: 600;
    color: rgba(255,255,255,0.9);
    line-height: 1.4; max-width: 700px;
    margin-bottom: 40px;
  }
  .smaller {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px; font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="big-number">170M</div>
  <p class="body">avaliacoes falsas removidas pelo Google</p>
  <p class="smaller">As suas sao reais?</p>
</div>
</body>
</html>
