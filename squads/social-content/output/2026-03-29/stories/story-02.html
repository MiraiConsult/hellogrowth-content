<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 02 — Regra de Ouro</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1920px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .story {
    width: 1080px; height: 1920px;
    background: #0d0d0d;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 0 80px;
    box-sizing: border-box;
    position: relative;
  }
  .handle {
    position: absolute; top: 60px; left: 50%;
    transform: translateX(-50%);
    font-size: 15px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 16px;
    text-transform: uppercase; letter-spacing: 5px;
    color: #3BAA7A;
    margin-bottom: 50px;
  }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 60px;
    text-transform: uppercase; color: #fff;
    line-height: 1.1; margin: 0 0 30px 0;
    max-width: 800px;
  }
  .accent {
    font-family: 'Montserrat', sans-serif;
    font-size: 32px; font-weight: 700;
    color: #6CCFAA;
  }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="label">REGRA DE OURO</div>
  <h1 class="title">QUALIDADE GERA REVIEWS.</h1>
  <p class="accent">Nao o contrario.</p>
</div>
</body>
</html>
