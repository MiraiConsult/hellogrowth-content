<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 03 — Stat</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1080px; height: 1350px;
    background: #3BAA7A;
    display: flex; flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 0 80px;
    box-sizing: border-box;
    position: relative;
  }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 60px;
    line-height: 1.05; text-transform: uppercase;
    color: #fff; margin: 0 0 50px 0;
    max-width: 820px;
  }
  .stat {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 140px;
    color: #fff; line-height: 1;
    margin: 0 0 20px 0;
  }
  .desc {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px; font-weight: 500;
    color: rgba(255,255,255,0.9);
    line-height: 1.5; max-width: 700px;
    margin-bottom: 50px;
  }
  .desc strong { font-weight: 900; text-transform: uppercase; }
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase; letter-spacing: 3px;
    padding-top: 30px;
    border-top: 3px solid rgba(255,255,255,0.25);
  }
  .handle {
    position: absolute; bottom: 50px; right: 80px;
    font-size: 14px; color: rgba(255,255,255,0.4);
    font-weight: 600; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <h1 class="title">O CONSUMIDOR SABE QUANDO E FAKE.</h1>
  <div class="stat">54%</div>
  <p class="desc">desconfiam de perfis com <strong>apenas avaliacoes positivas</strong></p>
  <div class="tagline">Autenticidade &gt; Perfeicao</div>
  <div class="handle">@hellogrowth__</div>
</div>
</body>
</html>
