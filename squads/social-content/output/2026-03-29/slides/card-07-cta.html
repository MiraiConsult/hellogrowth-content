<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 07 — CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    background-image: radial-gradient(circle at 50% 50%, rgba(59,170,122,0.12) 0%, transparent 60%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 0 80px;
    box-sizing: border-box;
    position: relative;
  }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 52px;
    text-transform: uppercase; color: #fff;
    line-height: 1.1; margin: 0 0 24px 0;
    max-width: 800px;
  }
  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 22px; font-weight: 500;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px; line-height: 1.5;
  }
  .cta {
    font-family: 'Montserrat', sans-serif;
    font-size: 24px; font-weight: 700;
    color: #6CCFAA;
    margin-bottom: 60px;
  }
  .divider {
    width: 60px; height: 3px;
    background: rgba(255,255,255,0.15);
    margin-bottom: 60px;
    border-radius: 2px;
  }
  .brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 42px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #2D7D5F, #3BAA7A, #6CCFAA, #A0E8CC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px; font-weight: 500;
    color: rgba(255,255,255,0.45);
    margin-bottom: 40px; letter-spacing: 0.5px;
  }
  .source {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 400;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">
  <h1 class="title">SUAS AVALIACOES SAO GENUINAS?</h1>
  <p class="subtitle">Se sim, parabens. Se nao, e hora de mudar.</p>
  <p class="cta">Comenta sua nota no Google &#x1F447;</p>
  <div class="divider"></div>
  <div class="brand">HELLOGROWTH</div>
  <p class="tagline">Mais reputacao. Mais confianca. Mais vendas.</p>
  <p class="source">Dados: Google, FTC, Zendesk 2026</p>
</div>
</body>
</html>
