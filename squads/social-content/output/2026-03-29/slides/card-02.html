<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 02 — Alerta</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1080px; height: 1350px;
    background: linear-gradient(180deg, #1a0a00 0%, #0d0d0d 100%);
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 80px;
    box-sizing: border-box;
    position: relative;
  }
  .label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800; font-size: 16px;
    text-transform: uppercase; letter-spacing: 5px;
    color: #FF6B35;
    margin-bottom: 32px;
  }
  .title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 64px;
    line-height: 1.05; text-transform: uppercase;
    color: #fff; margin: 0 0 20px 0;
    max-width: 800px;
  }
  .accent-line {
    width: 120px; height: 5px;
    background: #FF6B35;
    margin: 30px 0 40px 0;
    border-radius: 3px;
  }
  .body {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px; font-weight: 400;
    line-height: 1.6; color: rgba(255,255,255,0.75);
    max-width: 820px;
  }
  .body strong { color: #FF6B35; font-weight: 700; }
  .handle {
    position: absolute; bottom: 50px; left: 80px;
    font-size: 14px; color: rgba(255,255,255,0.35);
    font-weight: 600; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="label">&#9888; ALERTA</div>
  <h1 class="title">AVALIACOES FALSAS SAO CRIME.</h1>
  <div class="accent-line"></div>
  <p class="body">
    A FTC americana multa ate <strong>US$51.744 por avaliacao falsa</strong>.
    No Brasil, o Google ja remove perfis inteiros.
  </p>
  <div class="handle">@hellogrowth__</div>
</div>
</body>
</html>
