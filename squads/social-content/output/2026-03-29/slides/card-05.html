<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Card 05 — Big Number</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1080px; height: 1350px;
    background: #0d0d0d;
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 0 80px;
    box-sizing: border-box;
    position: relative;
  }
  .big-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 180px;
    color: #FF6B35; line-height: 1;
    margin: 0 0 16px 0;
  }
  .body {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px; font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.5; margin-bottom: 50px;
    max-width: 750px;
  }
  .green-divider {
    width: 80px; height: 4px;
    background: #3BAA7A;
    border-radius: 2px;
    margin-bottom: 50px;
  }
  .quote-box {
    border-left: 4px solid #3BAA7A;
    padding: 28px 0 28px 32px;
    margin-bottom: 20px;
    max-width: 800px;
  }
  .quote-box p {
    font-family: 'Montserrat', sans-serif;
    font-size: 22px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    line-height: 1.6; margin: 0;
    font-style: italic;
  }
  .source {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 500;
    color: rgba(255,255,255,0.35);
    margin-top: 16px; padding-left: 36px;
  }
  .handle {
    position: absolute; bottom: 50px; left: 80px;
    font-size: 14px; color: rgba(255,255,255,0.35);
    font-weight: 600; letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="big-number">170M</div>
  <p class="body">avaliacoes falsas removidas pelo Google em um unico ano.</p>
  <div class="green-divider"></div>
  <div class="quote-box">
    <p>&ldquo;Se o Google detectar que voce comprou avaliacoes, seu perfil pode ser bloqueado permanentemente.&rdquo;</p>
  </div>
  <div class="source">&mdash; Google Business Profile 2026</div>
  <div class="handle">@hellogrowth__</div>
</div>
</body>
</html>
