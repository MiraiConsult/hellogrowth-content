<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview Strip</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: #1a1a1a;
    font-family: 'Montserrat', sans-serif;
  }
  body { padding: 40px; }
  .strip {
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  .strip img {
    width: 270px; height: 337px;
    border-radius: 12px;
    object-fit: cover;
    background: #0d0d0d;
  }
</style>
</head>
<body>
<div class="strip">
  <img src="card-01-cover.png" alt="Card 01">
  <img src="card-02.png" alt="Card 02">
  <img src="card-03.png" alt="Card 03">
  <img src="card-04.png" alt="Card 04">
  <img src="card-05.png" alt="Card 05">
  <img src="card-06.png" alt="Card 06">
  <img src="card-07-cta.png" alt="Card 07">
</div>
</body>
</html>
