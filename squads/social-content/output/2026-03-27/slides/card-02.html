<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }
  .headline {
    font-size: 52px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 30px;
  }
  .divider {
    width: 120px;
    height: 5px;
    background: linear-gradient(90deg, #2D7D5F, #6CCFAA);
    border-radius: 3px;
    margin-bottom: 30px;
  }
  .body-text {
    font-size: 30px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.5;
    margin-bottom: 50px;
  }
  .highlight-box {
    background: rgba(45,125,95,0.15);
    border: 2px solid #2D7D5F;
    border-radius: 16px;
    padding: 36px 40px;
  }
  .highlight-box p {
    font-size: 28px;
    font-weight: 700;
    color: #A0E8CC;
    line-height: 1.4;
  }
  .highlight-box strong {
    color: #3BAA7A;
    font-weight: 900;
  }
</style>
</head>
<body>
<div class="card">
  <div class="headline">70% dos brasileiros leem avaliações antes de comprar.</div>
  <div class="divider"></div>
  <div class="body-text">Não é tendência. É o novo padrão de consumo.</div>
  <div class="highlight-box">
    <p><strong>43%</strong> dizem que avaliações influenciam <strong>MUITO</strong> a decisão</p>
  </div>
</div>
</body>
</html>
