<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }
  .label {
    font-size: 20px;
    font-weight: 700;
    color: #6CCFAA;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .headline {
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 36px;
  }
  .body-text {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.6;
  }
  .body-text .accent {
    color: #3BAA7A;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="card">
  <div class="label">A VERDADE</div>
  <div class="headline">Avaliação perfeita também gera desconfiança.</div>
  <div class="body-text">
    <span class="accent">54%</span> desconfiam de lojas com APENAS notas positivas. O consumidor quer <span class="accent">autenticidade</span>, não perfeição.
  </div>
</div>
</body>
</html>
