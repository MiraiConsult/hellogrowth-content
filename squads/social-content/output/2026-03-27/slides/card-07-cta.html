<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(160deg, #0d0d0d 0%, rgba(45,125,95,0.15) 50%, #0d0d0d 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
  }
  .headline {
    font-size: 46px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 20px;
  }
  .subtitle {
    font-size: 26px;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    margin-bottom: 50px;
  }
  .cta-button {
    background: #2D7D5F;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-size: 28px;
    font-weight: 700;
    padding: 24px 56px;
    border: none;
    border-radius: 16px;
    cursor: pointer;
    margin-bottom: 50px;
    letter-spacing: 0.5px;
  }
  .divider {
    width: 80px;
    height: 3px;
    background: rgba(108,207,170,0.3);
    border-radius: 2px;
    margin-bottom: 50px;
  }
  .brand {
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #2D7D5F, #3BAA7A, #6CCFAA, #A0E8CC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 16px;
  }
  .slogan {
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
    margin-bottom: 50px;
  }
  .source {
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="card">
  <div class="headline">Quantas avaliações sua empresa tem no Google?</div>
  <div class="subtitle">Se são menos de 50, você está perdendo vendas.</div>
  <div class="cta-button">Comenta aqui embaixo &#x1F447;</div>
  <div class="divider"></div>
  <div class="brand">HELLOGROWTH</div>
  <div class="slogan">Mais reputação. Mais confiança. Mais vendas.</div>
  <div class="source">Fontes: ABComm, Opinion Box, Baymard Institute</div>
</div>
</body>
</html>
