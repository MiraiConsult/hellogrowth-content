<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: url('gamma-card03.png') center/cover no-repeat;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,13,13,0.88);
  }
  .content {
    position: relative;
    z-index: 2;
  }
  .label {
    font-size: 20px;
    font-weight: 700;
    color: #6CCFAA;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .headline {
    font-size: 52px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 30px;
  }
  .headline strong {
    color: #3BAA7A;
  }
  .body-text {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.75);
    line-height: 1.5;
    margin-bottom: 50px;
  }
  .quote-box {
    background: rgba(59,170,122,0.1);
    border-left: 5px solid #3BAA7A;
    padding: 30px 36px;
    border-radius: 0 12px 12px 0;
  }
  .quote-box p {
    font-size: 30px;
    font-weight: 700;
    color: #A0E8CC;
    font-style: italic;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="card">
  <div class="overlay"></div>
  <div class="content">
    <div class="label">O RISCO</div>
    <div class="headline">Lojas sem avaliações são <strong>IGNORADAS.</strong></div>
    <div class="body-text">O fator #1 de insegurança em lojas virtuais é a ausência de avaliações de outros clientes.</div>
    <div class="quote-box">
      <p>"Sem prova social, seu produto não existe."</p>
    </div>
  </div>
</div>
</body>
</html>
