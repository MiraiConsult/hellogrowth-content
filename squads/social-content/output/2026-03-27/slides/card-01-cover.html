<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    width: 1080px;
    height: 1350px;
    overflow: hidden;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: url('gamma-cover.png') center/cover no-repeat;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 60px;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(13,13,13,0.5) 0%, rgba(13,13,13,0.85) 60%, rgba(13,13,13,0.95) 100%);
  }
  .top-bar {
    position: absolute;
    top: 40px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2;
  }
  .handle {
    font-size: 22px;
    font-weight: 500;
    color: #A0E8CC;
    letter-spacing: 0.5px;
  }
  .badge {
    background: rgba(45,125,95,0.6);
    color: #A0E8CC;
    font-size: 18px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 8px;
    letter-spacing: 1px;
  }
  .content {
    position: relative;
    z-index: 2;
  }
  .big-number {
    font-size: 96px;
    font-weight: 900;
    color: #3BAA7A;
    line-height: 1;
    margin-bottom: 20px;
  }
  .headline {
    font-size: 48px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.15;
    margin-bottom: 20px;
  }
  .subtitle {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    line-height: 1.4;
    margin-bottom: 60px;
  }
  .swipe {
    font-size: 22px;
    font-weight: 500;
    color: #6CCFAA;
    letter-spacing: 2px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="card">
  <div class="overlay"></div>
  <div class="top-bar">
    <span class="handle">@hellogrowth__</span>
    <span class="badge">MAR 2026</span>
  </div>
  <div class="content">
    <div class="big-number">R$260bi</div>
    <div class="headline">E sua empresa ainda não tem avaliações?</div>
    <div class="subtitle">O e-commerce brasileiro bate recorde. E você?</div>
    <div class="swipe">Desliza &rarr;</div>
  </div>
</div>
</body>
</html>
