<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }
  .story {
    width: 1080px;
    height: 1920px;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
  }
  .handle {
    font-size: 20px;
    font-weight: 500;
    color: #A0E8CC;
    letter-spacing: 0.5px;
    position: absolute;
    top: 60px;
    left: 80px;
  }
  .big-number {
    font-size: 180px;
    font-weight: 900;
    color: #3BAA7A;
    line-height: 1;
    margin-bottom: 30px;
  }
  .main-text {
    font-size: 42px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
    margin-bottom: 50px;
  }
  .smaller-text {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="story">
  <span class="handle">@hellogrowth__</span>
  <div class="big-number">70%</div>
  <div class="main-text">dos brasileiros leem avaliações antes de comprar</div>
  <div class="smaller-text">E a sua empresa tem avaliações?</div>
</div>
</body>
</html>
