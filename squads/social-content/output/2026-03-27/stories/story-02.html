<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }
  .story {
    width: 1080px;
    height: 1920px;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
  }
  .handle {
    font-size: 20px;
    font-weight: 500;
    color: #A0E8CC;
    letter-spacing: 0.5px;
    position: absolute;
    top: 60px;
    left: 80px;
  }
  .label {
    font-size: 20px;
    font-weight: 700;
    color: #6CCFAA;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .headline {
    font-size: 46px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1.2;
    margin-bottom: 50px;
  }
  .tips {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .tip {
    background: rgba(45,125,95,0.1);
    border-left: 5px solid #3BAA7A;
    border-radius: 0 14px 14px 0;
    padding: 32px 36px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }
  .tip-number {
    font-size: 32px;
    font-weight: 900;
    color: #2D7D5F;
    min-width: 40px;
  }
  .tip-text {
    font-size: 26px;
    font-weight: 500;
    color: rgba(255,255,255,0.9);
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="story">
  <span class="handle">@hellogrowth__</span>
  <div class="label">DICA DO DIA</div>
  <div class="headline">Como conseguir mais avaliações:</div>
  <div class="tips">
    <div class="tip">
      <span class="tip-number">1</span>
      <span class="tip-text">Envie um link direto do Google Reviews por WhatsApp</span>
    </div>
    <div class="tip">
      <span class="tip-number">2</span>
      <span class="tip-text">Ofereça um desconto no próximo pedido</span>
    </div>
    <div class="tip">
      <span class="tip-number">3</span>
      <span class="tip-text">Responda cada review em até 24h</span>
    </div>
  </div>
</div>
</body>
</html>
