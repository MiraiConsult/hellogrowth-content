<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Preview Strip</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  body {
    background: #1a1a1a;
    padding: 40px;
  }
  .strip {
    display: flex;
    gap: 20px;
  }
  .strip img {
    width: 270px;
    height: 337px;
    border-radius: 12px;
    object-fit: cover;
  }
</style>
</head>
<body>
<div class="strip">
  <img src="card-01-cover.png" alt="Card 01">
  <img src="card-02.png" alt="Card 02">
  <img src="card-03.png" alt="Card 03">
  <img src="card-04.png" alt="Card 04">
  <img src="card-05.png" alt="Card 05">
  <img src="card-06.png" alt="Card 06">
  <img src="card-07-cta.png" alt="Card 07">
</div>
</body>
</html>
