<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Card 04 - Onde a IA Mais Ajuda</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: #2D7D5F;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    box-sizing: border-box;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 56px;
    color: #fff;
    text-transform: uppercase;
    margin: 0 0 80px 0;
    line-height: 1.1;
  }
  .bar-group {
    margin-bottom: 50px;
  }
  .bar-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: #fff;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .bar-label .percent {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 36px;
  }
  .bar-track {
    width: 100%;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #fff;
    border-radius: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>ONDE A IA MAIS AJUDA</h1>
  <div class="bar-group">
    <div class="bar-label">
      <span>Atendimento ao cliente</span>
      <span class="percent">46,5%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width: 46.5%;"></div>
    </div>
  </div>
  <div class="bar-group">
    <div class="bar-label">
      <span>Marketing e vendas</span>
      <span class="percent">42,1%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width: 42.1%;"></div>
    </div>
  </div>
  <div class="bar-group">
    <div class="bar-label">
      <span>Gestão financeira</span>
      <span class="percent">23,4%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width: 23.4%;"></div>
    </div>
  </div>
</div>
</body>
</html>
