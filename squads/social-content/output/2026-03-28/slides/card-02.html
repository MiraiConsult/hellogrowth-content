<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Card 02</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(135deg, #FF8C42, #E85D26);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    box-sizing: border-box;
    position: relative;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 60px;
    line-height: 1.05;
    color: #fff;
    text-transform: uppercase;
    margin: 0 0 60px 0;
  }
  .body-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 28px;
    line-height: 1.7;
    color: rgba(255,255,255,0.95);
  }
  .body-text p {
    margin: 0 0 20px 0;
  }
  .handle {
    position: absolute;
    bottom: 48px;
    left: 80px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>
<div class="card">
  <h1>A IA NÃO É MAIS COISA DE EMPRESA GRANDE.</h1>
  <div class="body-text">
    <p>8 em cada 10 novos planos de negócio já incluem IA.</p>
    <p>64% das PMEs vão adotar chatbots até o fim de 2026.</p>
  </div>
  <div class="handle">@hellogrowth__</div>
</div>
</body>
</html>
