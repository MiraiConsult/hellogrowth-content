<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Card 05</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: url('gamma-cover.png') center/cover no-repeat;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(232,93,38,0.7) 0%, rgba(13,13,13,0.85) 100%);
  }
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    box-sizing: border-box;
    z-index: 2;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 70px;
    color: #fff;
    text-transform: uppercase;
    line-height: 1.05;
    margin: 0 0 60px 0;
  }
  .source {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    font-style: italic;
  }
</style>
</head>
<body>
<div class="card">
  <div class="overlay"></div>
  <div class="content">
    <h1>83% DOS TIMES DE VENDAS COM IA CRESCERAM A RECEITA</h1>
    <div class="source">Salesforce State of Sales Report 2026</div>
  </div>
</div>
</body>
</html>
