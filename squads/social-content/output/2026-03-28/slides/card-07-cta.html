<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Card 07 - CTA</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
    box-sizing: border-box;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 60px;
    color: #fff;
    text-transform: uppercase;
    margin: 0 0 24px 0;
    line-height: 1.1;
  }
  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 26px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 16px;
  }
  .cta {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: 32px;
    color: #FF8C42;
    margin-bottom: 60px;
  }
  .divider {
    width: 200px;
    height: 2px;
    background: rgba(255,255,255,0.15);
    margin-bottom: 60px;
  }
  .brand {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 56px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #2D7D5F, #6CCFAA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .slogan {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
  }
  .source {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
<div class="card">
  <h1>SUA EMPRESA JÁ USA IA?</h1>
  <div class="subtitle">Conta pra gente nos comentários</div>
  <div class="cta">Comenta aqui 👇</div>
  <div class="divider"></div>
  <div class="brand">HELLOGROWTH</div>
  <div class="slogan">Crescimento inteligente para o seu negócio</div>
  <div class="source">Fontes: Sebrae, Salesforce, McKinsey 2026</div>
</div>
</body>
</html>
