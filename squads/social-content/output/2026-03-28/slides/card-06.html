<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Card 06 - Ferramentas</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  .card {
    width: 1080px;
    height: 1350px;
    background: linear-gradient(180deg, #0d0d0d 0%, #1a1208 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    box-sizing: border-box;
  }
  .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #FF8C42;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 52px;
    color: #fff;
    text-transform: uppercase;
    margin: 0 0 64px 0;
    line-height: 1.1;
  }
  .item {
    display: flex;
    align-items: center;
    margin-bottom: 36px;
    border-left: 5px solid #FF8C42;
    padding-left: 32px;
  }
  .item-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 64px;
    color: #FF8C42;
    margin-right: 28px;
    line-height: 1;
    min-width: 60px;
  }
  .item-name {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 30px;
    color: #fff;
  }
</style>
</head>
<body>
<div class="card">
  <div class="label">COMECE HOJE</div>
  <h1>4 FERRAMENTAS DE IA GRÁTIS</h1>
  <div class="item">
    <div class="item-number">1.</div>
    <div class="item-name">ChatGPT</div>
  </div>
  <div class="item">
    <div class="item-number">2.</div>
    <div class="item-name">Canva AI</div>
  </div>
  <div class="item">
    <div class="item-number">3.</div>
    <div class="item-name">Google Meu Negócio</div>
  </div>
  <div class="item">
    <div class="item-number">4.</div>
    <div class="item-name">WhatsApp Business</div>
  </div>
</div>
</body>
</html>
