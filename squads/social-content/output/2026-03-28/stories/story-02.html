<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Story 02</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  .story {
    width: 1080px;
    height: 1920px;
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
    box-sizing: border-box;
    position: relative;
  }
  .handle {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: rgba(255,255,255,0.8);
  }
  .label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #FF8C42;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 32px;
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 56px;
    color: #fff;
    text-transform: uppercase;
    margin: 0 0 80px 0;
    line-height: 1.1;
  }
  .list {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 32px;
    color: #6CCFAA;
    line-height: 2.2;
  }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="label">DICA RÁPIDA</div>
  <h1>4 IAs GRÁTIS PARA SEU NEGÓCIO</h1>
  <div class="list">
    ChatGPT<br>
    Canva AI<br>
    Google Meu Negócio<br>
    WhatsApp Business
  </div>
</div>
</body>
</html>
