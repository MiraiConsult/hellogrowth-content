<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<title>Story 01</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
  }
  .story {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(180deg, #FF8C42, #E85D26);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
    box-sizing: border-box;
    position: relative;
  }
  .handle {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: rgba(255,255,255,0.8);
  }
  .big-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 280px;
    color: #fff;
    line-height: 0.9;
    margin-bottom: 40px;
  }
  .main-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 40px;
    color: #fff;
    line-height: 1.4;
    margin-bottom: 40px;
  }
  .secondary-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 30px;
    color: rgba(255,255,255,0.85);
  }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="big-number">52,7%</div>
  <div class="main-text">dos empreendedores acham IA essencial</div>
  <div class="secondary-text">Mas 65,7% não usam.</div>
</div>
</body>
</html>
