<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0d0d0d; width: 1080px; height: 1920px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.story { width: 1080px; height: 1920px; padding: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(160deg, #0d0d0d 0%, #0a1a14 100%); color: #fff; text-align: center; position: relative; }
.handle { position: absolute; top: 50px; left: 80px; font-size: 20px; font-weight: 700; opacity: 0.5; text-align: left; }
.headline { font-size: 48px; font-weight: 900; line-height: 1.2; margin-bottom: 30px; max-width: 850px; }
.accent { color: #6CCFAA; }
.subtitle { font-size: 30px; font-weight: 400; opacity: 0.55; margin-bottom: 60px; }
.cta-button { background: #2D7D5F; color: #fff; padding: 30px 70px; border-radius: 20px; font-size: 32px; font-weight: 800; margin-bottom: 70px; }
.arrow { font-size: 50px; opacity: 0.5; margin-bottom: 50px; }
.brand-name { font-size: 44px; font-weight: 900; letter-spacing: 3px; background: linear-gradient(90deg, #2D7D5F, #3BAA7A, #6CCFAA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 14px; }
.brand-slogan { font-size: 22px; font-weight: 400; opacity: 0.35; }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="headline">Quer sair dos <span class="accent">83% despreparados</span>?</div>
  <div class="subtitle">Veja o carrossel completo no feed</div>
  <div class="cta-button">Ver carrossel →</div>
  <div class="arrow">⬇️</div>
  <div class="brand-name">HELLOGROWTH</div>
  <div class="brand-slogan">Mais reputação. Mais confiança. Mais vendas.</div>
</div>
</body>
</html>
