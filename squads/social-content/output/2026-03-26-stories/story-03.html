<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0d0d0d; width: 1080px; height: 1920px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.story { width: 1080px; height: 1920px; padding: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0d0d0d; color: #fff; text-align: center; position: relative; }
.handle { position: absolute; top: 50px; left: 80px; font-size: 20px; font-weight: 700; opacity: 0.5; text-align: left; }
.label { font-size: 18px; font-weight: 800; text-transform: uppercase; letter-spacing: 5px; color: #2D7D5F; margin-bottom: 40px; }
.headline { font-size: 48px; font-weight: 900; line-height: 1.15; margin-bottom: 50px; max-width: 850px; }
.accent { color: #6CCFAA; }
.tips { width: 100%; max-width: 850px; text-align: left; }
.tip { background: rgba(45,125,95,0.08); border-left: 4px solid #3BAA7A; padding: 24px 30px; border-radius: 0 16px 16px 0; margin-bottom: 20px; font-size: 28px; font-weight: 500; line-height: 1.4; }
.tip-num { color: #6CCFAA; font-weight: 900; margin-right: 12px; }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="label">Dica do dia</div>
  <div class="headline">3 ações para <span class="accent">melhorar</span> sua nota no Google hoje</div>
  <div class="tips">
    <div class="tip"><span class="tip-num">1.</span> Responda TODA avaliação em até 24h</div>
    <div class="tip"><span class="tip-num">2.</span> Peça feedback após cada venda</div>
    <div class="tip"><span class="tip-num">3.</span> Resolva reclamações em público, não no privado</div>
  </div>
</div>
</body>
</html>
