<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0d0d0d; width: 1080px; height: 1920px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.story { width: 1080px; height: 1920px; padding: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0d0d0d; color: #fff; text-align: center; position: relative; }
.handle { position: absolute; top: 50px; left: 80px; font-size: 20px; font-weight: 700; opacity: 0.5; text-align: left; }
.quiz-label { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; color: #2D7D5F; margin-bottom: 40px; }
.question { font-size: 46px; font-weight: 900; line-height: 1.2; margin-bottom: 60px; max-width: 850px; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 800px; }
.option { padding: 30px; border-radius: 18px; font-size: 32px; font-weight: 700; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12); text-align: center; }
.option.correct { background: rgba(45,125,95,0.15); border-color: #3BAA7A; color: #6CCFAA; }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="quiz-label">Quiz</div>
  <div class="question">Qual % das empresas brasileiras tem plano ativo de reputação digital?</div>
  <div class="options">
    <div class="option correct">17%</div>
    <div class="option">35%</div>
    <div class="option">52%</div>
    <div class="option">71%</div>
  </div>
</div>
</body>
</html>
