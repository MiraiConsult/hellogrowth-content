<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #0d0d0d; width: 1080px; height: 1920px; font-family: 'Montserrat', sans-serif; overflow: hidden; }
.story { width: 1080px; height: 1920px; padding: 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #0d0d0d; color: #fff; text-align: center; position: relative; }
.handle { position: absolute; top: 50px; left: 80px; font-size: 20px; font-weight: 700; opacity: 0.5; text-align: left; }
.big-number { font-size: 260px; font-weight: 900; color: #3BAA7A; line-height: 0.85; margin-bottom: 40px; }
.headline { font-size: 48px; font-weight: 900; line-height: 1.2; margin-bottom: 30px; max-width: 850px; }
.body-text { font-size: 30px; font-weight: 400; opacity: 0.55; line-height: 1.5; max-width: 800px; }
</style>
</head>
<body>
<div class="story">
  <div class="handle">@hellogrowth__</div>
  <div class="big-number">92%</div>
  <div class="headline">dos consumidores só interagem com empresas nota 4+</div>
  <div class="body-text">Qual a nota da sua empresa no Google agora?</div>
</div>
</body>
</html>
