name: social-content-pipeline
title: "Pipeline de Produção de Conteúdo Social"
version: "3.0.0"

steps:
  - id: step-01-research-focus
    name: "Foco da Pesquisa"
    file: steps/step-01-research-focus.md
    type: checkpoint

  - id: step-02-research
    name: "Pesquisa de Tendências"
    file: steps/step-02-research.md
    type: agent
    agent: researcher
    execution: subagent
    inputFile: pipeline/data/research-focus.md

  - id: step-03-news-selection
    name: "Seleção de Notícia"
    file: steps/step-03-news-selection.md
    type: checkpoint

  - id: step-04-generate-angles
    name: "Geração de Ângulos"
    file: steps/step-04-generate-angles.md
    type: agent
    agent: instagram-creator
    execution: inline

  - id: step-05-angle-selection
    name: "Seleção de Ângulo"
    file: steps/step-05-angle-selection.md
    type: checkpoint

  - id: step-06-create-instagram
    name: "Criação Conteúdo Instagram"
    file: steps/step-06-create-instagram.md
    type: agent
    agent: instagram-creator
    execution: inline
    format: instagram-feed

  - id: step-07-create-linkedin
    name: "Criação Conteúdo LinkedIn"
    file: steps/step-07-create-linkedin.md
    type: agent
    agent: linkedin-creator
    execution: subagent
    format: linkedin-post

  - id: step-08-design-visuals
    name: "Design Visual (HTML/CSS → Imagens)"
    file: steps/step-08-design-visuals.md
    type: agent
    agent: designer
    execution: inline

  - id: step-09-content-approval
    name: "Aprovação do Conteúdo"
    file: steps/step-09-content-approval.md
    type: checkpoint

  - id: step-10-review
    name: "Revisão de Qualidade"
    file: steps/step-10-review.md
    type: agent
    agent: reviewer
    execution: inline

  - id: step-11-final-approval
    name: "Aprovação Final"
    file: steps/step-11-final-approval.md
    type: checkpoint
    on_reject:
      goto: step-06-create-instagram

  - id: step-12-publish-instagram
    name: "Publicação no Instagram"
    file: steps/step-12-publish-instagram.md
    type: agent
    agent: instagram-publisher
    execution: inline
